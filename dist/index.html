<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, user-scalable=no, viewport-fit=cover">
    <title>VK Drive PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    <style>
        body { font-family: 'Roboto', sans-serif; background-color: #f7f9fc; color: #3c4043; padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); -webkit-tap-highlight-color: transparent; }
        .breadcrumb-item:not(:last-child)::after { content: '›'; margin: 0 8px; color: #9ca3af; font-size: 18px; }
        .touch-target { min-height: 44px; min-width: 44px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .touch-target:active { opacity: 0.5; transform: scale(0.95); }
        .sticky-top-block { position: sticky; top: 0; z-index: 100; background-color: white; }
        .animate-slide-down { animation: slideDown 0.2s ease-out; }
        @keyframes slideDown { from { transform: translateY(-100%); } to { transform: translateY(0); } }
    </style>
</head>
<body class="antialiased">

    <div id="captchaModal" class="hidden fixed inset-0 flex items-center justify-center p-6 z-[3000] backdrop-blur-sm bg-black/60">
        <div class="bg-white rounded-3xl p-6 max-w-sm text-center shadow-2xl">
            <h3 class="text-lg font-bold mb-3 text-gray-800">Требуется подтверждение</h3>
            <p class="text-sm text-gray-500 mb-4 text-balance">ВКонтакте запросил проверку. Пожалуйста, выполните действие в VK (например, обновите ленту) и нажмите кнопку ниже.</p>
            <img id="captchaImg" class="mx-auto mb-4 rounded-xl shadow-sm max-h-40 object-contain bg-gray-50 border"/>
            <button onclick="closeCaptcha()" class="bg-blue-600 w-full text-white px-4 py-3 rounded-2xl font-bold uppercase tracking-wider text-xs">Я подтвердил(а)</button>
        </div>
    </div>

    <div id="customPrompt" class="hidden fixed inset-0 flex items-center justify-center p-6 z-[2000] backdrop-blur-sm bg-black/40">
        <div class="bg-white rounded-[2rem] p-6 w-full max-w-sm shadow-2xl">
            <h3 id="promptTitle" class="text-lg font-bold mb-4 text-center">Название</h3>
            <input type="text" id="promptInput" class="w-full p-4 bg-gray-50 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 mb-6 font-medium text-center border-none">
            <div class="flex gap-3">
                <button onclick="closePrompt()" class="flex-1 py-3 font-bold text-gray-400">Отмена</button>
                <button id="promptConfirmBtn" class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold">ОК</button>
            </div>
        </div>
    </div>

    <div id="customConfirm" class="hidden fixed inset-0 flex items-center justify-center p-6 z-[2000] backdrop-blur-sm bg-black/40">
        <div class="bg-white rounded-[2rem] p-6 w-full max-w-sm shadow-2xl text-center">
            <h3 id="confirmTitle" class="text-lg font-bold mb-2">Удаление</h3>
            <p id="confirmDesc" class="text-sm text-gray-500 mb-6 px-2"></p>
            <div class="flex gap-3">
                <button onclick="closeConfirm()" class="flex-1 py-3 font-bold text-gray-400">Отмена</button>
                <button id="confirmActionBtn" class="flex-1 bg-red-500 text-white py-3 rounded-xl font-bold uppercase text-xs tracking-widest">Удалить</button>
            </div>
        </div>
    </div>

    <div class="sticky-top-block shadow-md">
        <div id="actionLoader" class="hidden bg-blue-600 text-white px-5 py-2.5 flex items-center justify-center animate-slide-down">
            <div class="animate-spin w-3 h-3 border-2 border-white border-t-transparent rounded-full mr-3"></div>
            <span id="actionLoaderText" class="text-[10px] font-black uppercase tracking-widest text-white/90">Синхронизация...</span>
        </div>

        <nav class="px-5 py-3 flex items-center justify-between">
            <div class="flex items-center gap-2 cursor-pointer" onclick="goToRoot()">
                <div class="text-blue-600"><i data-lucide="cloud" class="w-7 h-7"></i></div>
                <span class="text-xl font-black tracking-tighter text-gray-800 uppercase">VK DRIVE</span>
            </div>
            <div class="flex items-center gap-1">
                <button onclick="fetchFiles(this)" class="touch-target text-gray-400"><i data-lucide="rotate-cw" class="w-5 h-5"></i></button>
                <button onclick="uiPrompt('Новая папка', '', (n) => createFolder(n))" class="touch-target text-gray-400"><i data-lucide="folder-plus" class="w-6 h-6"></i></button>
                <button onclick="document.getElementById('fileInput').click()" class="bg-blue-600 text-white px-5 py-2.5 rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-lg shadow-blue-200">Загрузить</button>
                <input type="file" id="fileInput" class="hidden" multiple onchange="handleFiles(this.files)">
            </div>
        </nav>

        <div class="px-5 pb-3">
            <div class="relative">
                <i data-lucide="search" class="absolute left-4 top-3.5 text-gray-300 w-4 h-4"></i>
                <input type="text" id="searchInput" oninput="debounceSearch()" placeholder="Поиск в облаке..." class="w-full pl-11 pr-4 py-3 bg-gray-50 rounded-2xl outline-none text-sm border-none">
            </div>
        </div>

        <div id="breadcrumb" class="px-5 py-2 flex items-center overflow-x-auto whitespace-nowrap bg-white border-b border-gray-50 text-[9px] font-black text-gray-400 uppercase tracking-widest"></div>
    </div>

    <div id="queuePanel" class="hidden fixed bottom-6 left-5 right-5 bg-white shadow-2xl rounded-[2.5rem] p-5 border border-blue-50 z-[100]">
        <div class="flex justify-between items-center mb-3">
            <span id="qFileName" class="text-[10px] font-black text-gray-400 uppercase truncate pr-4">Файл</span>
            <span id="qPercent" class="text-xs font-black text-blue-600">0%</span>
        </div>
        <div class="w-full bg-gray-100 h-2 rounded-full overflow-hidden">
            <div id="qBar" class="bg-blue-600 h-full w-0 transition-all duration-300 shadow-sm shadow-blue-400"></div>
        </div>
        <div id="qStatus" class="text-[9px] text-gray-400 mt-3 text-center font-black uppercase tracking-widest">Ожидание...</div>
    </div>

    <main class="p-5 max-w-4xl mx-auto min-h-[60vh]"><div id="fileContainer" class="space-y-4"></div></main>

    <footer class="p-10 text-center"><div class="inline-block bg-blue-50 text-blue-600 px-4 py-2 rounded-full text-[9px] font-black tracking-[0.2em] border border-blue-100">VERSION 1.5.0 (SMART QUEUE)</div></footer>

    <script>
        const API_URL = 'https://my-vk-drive-backend.onrender.com';
        const VK_PARAMS = window.location.search;
        let currentPath = []; let allItems = []; let queue = []; let isProcessing = false; let captchaResolve = null;

        vkBridge.send("VKWebAppInit");
        fetchFiles();
        window.onload = () => { lucide.createIcons(); };

        // --- ЛОГИКА ---
        async function fetchFiles(btn) {
            if (btn) btn.classList.add('animate-spin');
            try {
                const res = await fetch(`${API_URL}/files${VK_PARAMS}`);
                allItems = await res.json();
                applyFilters();
            } catch (e) { document.getElementById('fileContainer').innerHTML = '<div class="py-20 text-center text-orange-400 font-bold uppercase italic text-xs">Сервер просыпается...</div>'; }
            if (btn) setTimeout(() => btn.classList.remove('animate-spin'), 500);
        }

        function applyFilters() {
            if (!Array.isArray(allItems)) allItems = [];
            const query = document.getElementById('searchInput').value.toLowerCase();
            const pathStr = currentPath.join('/');
            let folders = new Set(), files = [];

            allItems.forEach(i => {
                const t = i.title || "";
                if (query) { if (t.toLowerCase().includes(query)) files.push(i); } 
                else {
                    if (pathStr === "" && !t.includes('/')) files.push(i);
                    else if (pathStr === "" && t.includes('/')) folders.add(t.split('/')[0]);
                    else if (t.startsWith(pathStr + "/")) {
                        const rel = t.substring(pathStr.length + 1);
                        if (rel.includes('/')) folders.add(rel.split('/')[0]); else files.push(i);
                    }
                }
            });
            render(Array.from(folders).sort(), files.sort((a,b) => b.date - a.date));
        }

        function render(folders, files) {
            const container = document.getElementById('fileContainer'); container.innerHTML = '';
            updateBreadcrumb();
            const frag = document.createDocumentFragment();

            folders.forEach(f => {
                const d = document.createElement('div'); d.className = 'bg-white p-5 rounded-[2rem] shadow-sm border border-gray-100 flex items-center justify-between';
                d.innerHTML = `<div class="flex items-center gap-4 cursor-pointer flex-1" onclick="currentPath.push('${f}'); applyFilters();"><div class="bg-blue-50 p-3 rounded-2xl text-blue-600"><i data-lucide="folder" class="w-7 h-7 fill-current"></i></div><div class="min-w-0"><div class="font-bold text-gray-800 truncate">${f}</div><div class="text-[9px] text-gray-400 font-black uppercase tracking-widest">Папка</div></div></div><button onclick="uiConfirm('Удалить папку?', 'Всё внутри будет стерто.', () => deleteFolder('${f}'))" class="text-red-400 p-2"><i data-lucide="trash-2" class="w-5 h-5"></i></button>`;
                frag.appendChild(d);
            });

            files.forEach(file => {
                const fName = (file.title || "").split('/').pop();
                const d = document.createElement('div'); d.className = 'bg-white p-5 rounded-[2rem] shadow-sm border border-gray-100 flex flex-col gap-4';
                d.innerHTML = `<div class="flex items-center gap-4"><div class="bg-gray-50 p-3 rounded-2xl text-gray-400"><i data-lucide="file-text" class="w-7 h-7"></i></div><div class="flex-1 min-w-0"><div class="font-bold text-gray-800 truncate pr-2">${fName}</div><div class="text-[9px] text-blue-500 font-black uppercase tracking-widest">${(file.size/1024/1024).toFixed(2)} MB</div></div></div><div class="flex gap-6 px-1 text-[9px] font-black uppercase tracking-widest text-gray-400"><button onclick="downloadFile('${file.url}', '${file.title}')" class="text-blue-600">Скачать</button><button onclick="uiConfirm('Удалить файл?', 'Это навсегда.', () => deleteFile(${file.id}))" class="text-red-400">Удалить</button></div>`;
                frag.appendChild(d);
            });

            container.appendChild(frag);
            if (!folders.length && !files.length) container.innerHTML = '<div class="py-20 text-center text-gray-300 font-black uppercase italic text-[10px] tracking-widest">Пусто</div>';
            lucide.createIcons();
        }

        // --- ОЧЕРЕДЬ ---
        function handleFiles(files) {
            for (const f of files) queue.push({ file: f, status: "Ожидание", retry: 0 });
            document.getElementById('queuePanel').classList.remove('hidden');
            processQueue();
        }

        async function processQueue() {
            if (isProcessing) return; isProcessing = true;
            while (queue.some(i => i.status === "Ожидание")) {
                const item = queue.find(i => i.status === "Ожидание");
                await uploadItem(item);
                await new Promise(r => setTimeout(r, 1000));
            }
            isProcessing = false;
            document.getElementById('queuePanel').classList.add('hidden');
            fetchFiles();
        }

        function uploadItem(item) {
            return new Promise(resolve => {
                const fd = new FormData(); fd.append("file", item.file); fd.append("folder_path", currentPath.join('/'));
                const xhr = new XMLHttpRequest(); xhr.open("POST", `${API_URL}/upload${VK_PARAMS}`);
                
                xhr.upload.onprogress = (e) => {
                    const p = Math.round((e.loaded/e.total)*100);
                    document.getElementById('qBar').style.width = p+'%';
                    document.getElementById('qPercent').innerText = p+'%';
                    document.getElementById('qFileName').innerText = item.file.name;
                    document.getElementById('qStatus').innerText = p >= 100 ? "ФИНАЛИЗАЦИЯ ВК..." : "ОТПРАВКА НА СЕРВЕР...";
                };

                xhr.onload = async () => {
                    if (xhr.status === 200) { item.status = "Готово"; resolve(); }
                    else if (xhr.status === 403) {
                        const res = JSON.parse(xhr.responseText);
                        document.getElementById('qStatus').innerText = "ВК ТРЕБУЕТ ПОДТВЕРЖДЕНИЯ!";
                        await showCaptchaModal(res.captcha_img);
                        await new Promise(r => setTimeout(r, 10000)); // Ждем 10 сек после нажатия "Понятно"
                        resolve();
                    } else { item.status = "Ошибка"; resolve(); }
                };
                xhr.onerror = () => { item.status = "Ошибка"; resolve(); };
                xhr.send(fd);
            });
        }

        function showCaptchaModal(img) {
            return new Promise(r => {
                document.getElementById('captchaImg').src = img || '';
                document.getElementById('captchaModal').classList.remove('hidden');
                captchaResolve = r;
            });
        }
        function closeCaptcha() { document.getElementById('captchaModal').classList.add('hidden'); if(captchaResolve) captchaResolve(); }

        // --- ВСПОМОГАТЕЛЬНОЕ ---
        function updateBreadcrumb() {
            const bc = document.getElementById('breadcrumb'); bc.innerHTML = `<span onclick="goToRoot()" class="breadcrumb-item cursor-pointer">ДИСК</span>`;
            let tmp = []; currentPath.forEach(p => { tmp.push(p); const s = document.createElement('span'); s.className = 'breadcrumb-item cursor-pointer'; s.innerText = p.toUpperCase(); const snap = [...tmp]; s.onclick = () => { currentPath = snap; applyFilters(); }; bc.appendChild(s); });
        }
        function goToRoot() { currentPath = []; applyFilters(); }
        function debounceSearch() { clearTimeout(searchTimeout); searchTimeout = setTimeout(applyFilters, 150); }
        function uiPrompt(title, defVal, cb) { document.getElementById('promptTitle').innerText = title; document.getElementById('promptInput').value = defVal; document.getElementById('customPrompt').classList.remove('hidden'); document.getElementById('promptInput').focus(); document.getElementById('promptConfirmBtn').onclick = () => { const val = document.getElementById('promptInput').value; if (val) cb(val); closePrompt(); }; }
        function closePrompt() { document.getElementById('customPrompt').classList.add('hidden'); }
        function uiConfirm(title, desc, onAction) { document.getElementById('confirmTitle').innerText = title; document.getElementById('confirmDesc').innerText = desc; document.getElementById('customConfirm').classList.remove('hidden'); document.getElementById('confirmActionBtn').onclick = () => { onAction(); closeConfirm(); }; }
        function closeConfirm() { document.getElementById('customConfirm').classList.add('hidden'); }
        async function deleteFile(id) { await fetch(`${API_URL}/delete${VK_PARAMS}`, {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({doc_id:id})}); fetchFiles(); }
        async function deleteFolder(f) { const pref = currentPath.length ? currentPath.join('/')+'/'+f : f; const list = allItems.filter(i => i.title === pref || i.title.startsWith(pref+'/')); for (const i of list) await fetch(`${API_URL}/delete${VK_PARAMS}`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({doc_id: i.id}) }); fetchFiles(); }
        function downloadFile(u, t) { window.open(`${API_URL}/download-proxy?url=${encodeURIComponent(u)}&title=${encodeURIComponent(t)}${VK_PARAMS.replace('?', '&')}`); }
        function createFolder(n) { currentPath.push(n); applyFilters(); }
    </script>
</body>
</html>
