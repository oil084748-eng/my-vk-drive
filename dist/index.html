<head>

    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, user-scalable=no, viewport-fit=cover">

    <style>
        :root {
            --bg-main: #f1f4f8; --text-main: #1e252c;
            --blue-main: #3d7eb3; --blue-soft: #d4e6f3;
            --green-main: #3e9b7f; --green-soft: #d4ede4;
            --red-main: #b96a6a; --red-soft: #f0dede;
            --gray-soft: #e8ecf2; --gray-mid: #5f6e7a;
        }
        body { font-family: 'Roboto', sans-serif; background-color: var(--bg-main); color: var(--text-main); padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); -webkit-tap-highlight-color: transparent; }
        .bg-blue-600 { background-color: var(--blue-main) !important; } .bg-blue-50 { background-color: var(--blue-soft) !important; } .text-blue-600, .text-blue-500 { color: var(--blue-main) !important; }
        .bg-green-600 { background-color: var(--green-main) !important; } .bg-green-50 { background-color: var(--green-soft) !important; } .text-green-600 { color: var(--green-main) !important; }
        .bg-red-500 { background-color: var(--red-main) !important; } .bg-red-50 { background-color: var(--red-soft) !important; } .text-red-500 { color: var(--red-main) !important; }
        .bg-gray-50 { background-color: var(--gray-soft) !important; } .bg-gray-100 { background-color: #e0e6ed !important; } .text-gray-400 { color: var(--gray-mid) !important; } .text-gray-800 { color: var(--text-main) !important; }
        .btn-light { background-color: var(--gray-soft) !important; color: #26334a !important; font-weight: 600; }
        .border-gray-100 { border-color: #dfe4eb !important; }
        .file-card.selected { border-color: var(--blue-main); background-color: var(--blue-soft); box-shadow: 0 0 0 3px rgba(61, 126, 179, 0.15); }
        button, .touch-target { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); font-weight: 600; } button:active, .touch-target:active { transform: scale(0.95); opacity: 0.85; }
        .breadcrumb-item:not(:last-child)::after { content: '›'; margin: 0 8px; color: var(--gray-mid); font-size: 18px; }
        .touch-target { min-height: 44px; min-width: 44px; display: flex; align-items: center; justify-content: center; }
        .sticky-top-block { position: sticky; top: 0; z-index: 100; background-color: white; }
        .animate-slide-down { animation: slideDown 0.2s ease-out; } .animate-slide-bottom { animation: slideUp 0.3s ease-out; }
        @keyframes slideDown { from { transform: translateY(-100%); } to { transform: translateY(0); } } @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .file-card { will-change: transform, opacity; transition: all 0.2s; }
        .bg-captcha-alert { background-color: var(--red-soft) !important; color: var(--red-main) !important; }
        .iframe-scroll-wrapper { -webkit-overflow-scrolling: touch; overflow-y: auto; }
        .office-zoom-hack { width: 73% !important; height: 73% !important; transform: scale(1.37); transform-origin: top left; }
    </style>
</head>
<body class="antialiased">

    <div id="vk-captcha-overlay" class="hidden fixed inset-0 z-[99999] bg-black/80 backdrop-blur-sm flex flex-col items-center justify-center p-4">
        <div class="w-full max-w-sm flex justify-end mb-3">
            <button onclick="document.getElementById('vk-captcha-overlay').dispatchEvent(new CustomEvent('cancelCaptcha'))" class="text-white bg-white/20 p-2 rounded-full active:scale-95 transition-transform hover:bg-red-500">

    <div id="universalModal" class="hidden fixed inset-0 flex items-center justify-center p-6 z-[3000] backdrop-blur-sm bg-black/40">

            <div class="flex gap-3"><button id="umCancelBtn" onclick="closeUM()" class="flex-1 py-3 font-bold btn-light rounded-xl hidden">Отмена</button><button id="umConfirmBtn" class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold uppercase text-xs tracking-widest">ОК</button></div>
        </div>

    <div id="docModal" class="hidden fixed inset-0 z-[5000] bg-black/90 flex flex-col backdrop-blur-sm animate-slide-bottom">
        <div class="flex justify-between items-center p-4 border-b border-gray-800 bg-black/50">
            <span id="docTitle" class="text-white font-bold text-sm truncate pr-4">Просмотр</span>
            <div class="flex items-center gap-2"><a id="docExternalLink" href="#" target="_blank" class="hidden text-gray-400 hover:text-white bg-gray-800 p-2 rounded-full active:scale-95 transition-transform"><i data-lucide="external-link" class="w-5 h-5"></i></a><button onclick="closeDocModal()" class="text-gray-400 hover:text-white bg-gray-800 p-2 rounded-full active:scale-95 transition-transform"><i data-lucide="x" class="w-5 h-5"></i></button></div>

        <div class="iframe-scroll-wrapper flex-1 w-full relative bg-gray-100 flex items-center justify-center"><iframe id="docIframe" class="w-full h-full border-none"></iframe><video id="docVideo" class="hidden w-full max-h-full outline-none" controls playsinline preload="metadata"></video></div>
    </div>

    <div class="sticky-top-block shadow-md">
        <div id="actionLoader" class="hidden bg-blue-600 text-white px-5 py-2.5 flex items-center justify-center animate-slide-down"><div id="actionSpinner" class="animate-spin w-3 h-3 border-2 border-white border-t-transparent rounded-full mr-3"></div><span id="actionLoaderText" class="text-[10px] font-black uppercase tracking-widest">Синхронизация...</span></div>
        <nav class="px-4 py-2 flex items-center justify-between gap-2">
            <div class="flex flex-col items-center cursor-pointer min-w-max" onclick="safeNavigate(() => goToRoot())"><div class="text-blue-500 mb-0.5"><i data-lucide="cloud" class="w-6 h-6"></i></div><span class="text-[8px] font-black uppercase tracking-tighter text-gray-400 leading-none">Мой Диск</span></div>
            <div class="flex items-center gap-0.5">
                <button onclick="safeNavigate(() => goToTrash())" class="touch-target text-gray-300 hover:text-red-400"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                <button id="multiSelectBtn" onclick="toggleSelectionMode()" class="touch-target text-gray-400"><i data-lucide="more-vertical" class="w-5 h-5"></i></button>
                <button onclick="safeNavigate(() => fetchFiles(this))" class="touch-target text-gray-400"><i data-lucide="rotate-cw" class="w-5 h-5"></i></button>
                <button onclick="uiPrompt('Папка или Ссылка', '', (n) => createFolder(n))" class="touch-target text-gray-400"><i data-lucide="folder-plus" class="w-6 h-6"></i></button>
                <button onclick="document.getElementById('fileInput').click()" class="bg-blue-600 text-white px-3 py-2 rounded-xl font-bold text-xs shadow-md active:scale-95 transition-transform ml-1">Загрузить</button>
                <input type="file" id="fileInput" class="hidden" multiple onchange="handleFiles(this.files)">
            </div>
        </nav>
        <div id="trashPanel" class="hidden px-5 py-2 bg-red-50 border-y border-red-100"><button onclick="uiConfirm('Очистить корзину?', 'Удалить всё навсегда из ВК?', () => emptyTrash())" class="w-full bg-red-500 text-white py-2.5 rounded-xl font-bold text-[10px] uppercase tracking-widest shadow-sm active:scale-[0.98]">Очистить корзину</button></div>
        <div class="px-5 py-2 flex items-center justify-between gap-4 bg-white border-b border-gray-50 text-[10px] font-black text-gray-400 uppercase tracking-tighter">
            <div id="breadcrumb" class="flex items-center overflow-x-auto whitespace-nowrap scrollbar-hide"></div>
            <select id="sortSelect" onchange="applyFilters()" class="font-bold bg-gray-50 px-2 py-1 rounded-lg border-none outline-none text-blue-600"><option value="date_desc">Новые</option><option value="date_asc">Старые</option><option value="name_asc">Имя</option><option value="type_asc">Тип файла</option></select>
        </div>
    </div>

    <div id="bottomBar" class="hidden fixed bottom-0 left-0 right-0 bg-white border-t border-blue-100 pt-3 pb-4 px-5 shadow-[0_-10px_30px_rgba(0,0,0,0.05)] z-[2000] animate-slide-bottom"><div class="max-w-4xl mx-auto px-5" id="bottomBarInner"></div></div>

    <div id="progressContainer" class="hidden fixed bottom-10 left-5 right-5 bg-white shadow-2xl rounded-2xl p-5 border border-blue-50 z-[100] animate-slide-down">
        <div class="w-full flex flex-col gap-2 mb-3">
            <div class="flex justify-between items-center w-full">
                <span id="progressText" class="text-[11px] font-black text-gray-400 uppercase flex-1 truncate mr-4">Загрузка...</span>
                <span id="progressPercent" class="text-xs font-black text-blue-600">0%</span>
            </div>
            <div class="w-full bg-gray-100 h-1.5 rounded-full overflow-hidden"><div id="progressBar" class="bg-blue-600 h-full w-0 transition-all duration-300"></div></div>
        </div>
    </div>

    <main class="p-5 max-w-4xl mx-auto min-h-[60vh] pb-32">
        <div class="px-1 mb-6"><div class="relative"><i data-lucide="search" class="absolute left-4 top-3 text-gray-400 w-4 h-4"></i><input type="text" id="searchInput" oninput="debounceSearch()" placeholder="Поиск файлов..." class="w-full pl-11 pr-4 py-3 bg-gray-50 rounded-xl outline-none text-sm border-none shadow-inner"></div></div>
        <div id="fileContainer" class="space-y-3"></div>
    </main>

    <footer class="p-10 pb-20 text-center flex flex-col items-center gap-3">
        <div id="storageUsed" class="inline-block bg-white text-gray-400 px-4 py-2 rounded-full text-[10px] font-bold tracking-widest border border-gray-200 uppercase shadow-sm">ЗАНЯТО: 0 МБ</div>
        <div class="inline-block bg-blue-50 text-blue-600 px-4 py-2 rounded-full text-[10px] font-bold tracking-widest border border-blue-100 uppercase">ВЕРСИЯ: 11.0.1 (MOUNT POINT FIX)</div>
    </footer>

    <script>
        const API_URL = 'https://my-vk-drive-backend.onrender.com';
        const VK_PARAMS = window.location.search;
        const LINK_PREFIX = 'link56198522597_';
        const TARGET_GROUP_ID = 236017708; 
        
        let currentPath = []; 
        let allItems = []; 
        let queue = []; 
        let isProcessing = false; 
        let clipboard = null;
        let searchTimeout = null; 
        let selectionMode = false; 
        let selectedIds = new Set();
        let currentVisibleItems = { folders: [], files: [] };
        let isActionActive = false;

        let uploadBatchTotal = 0;
        let uploadBatchCurrent = 0;

        function escHtml(s) { return String(s || "").replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }
        function escJs(s) { return String(s || "").replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '&quot;').replace(/\n/g, '\\n').replace(/\r/g, '\\r'); }

        vkBridge.send("VKWebAppInit");
        window.onload = () => { lucide.createIcons(); checkGroupAccess(); };

        window.addEventListener('beforeunload', (e) => { 
            if (isActionActive || isProcessing) { e.preventDefault(); e.returnValue = 'Процесс ещё не завершен'; } 
        });

        function triggerCaptchaUI(show) {
            const l = document.getElementById('actionLoader');
            if(show) {
                document.getElementById('actionLoaderText').innerText = "ПРОВЕРКА ВКОНТАКТЕ...";
                l.classList.remove('hidden', 'bg-blue-600'); l.classList.add('bg-captcha-alert');
                document.getElementById('actionSpinner').classList.add('hidden');
                try { vkBridge.send("VKWebAppTapticNotificationOccurred", {"type": "error"}); } catch(e) {}
            } else {
                l.classList.add('hidden', 'bg-blue-600'); l.classList.remove('bg-captcha-alert');
                document.getElementById('actionSpinner').classList.remove('hidden');
            }
        }

        // 🔥 ИСПРАВЛЕННАЯ ОБЕРТКА ДЛЯ VK Bridge
        async function safeVKApiCall(method, params) {
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
            const isAndroid = /Android/i.test(navigator.userAgent);
            const isPC = !isIOS && !isAndroid;

            let attemptParams = { ...params };

            while (true) {
                try {
                    const req = await vkBridge.send("VKWebAppCallAPIMethod", {
                        "method": method,
                        "params": attemptParams,
                        "request_id": "req_" + Date.now()
                    });
                    return req.response;
                } catch (e) {
                    if (isPC) throw e;

                    if (e.error_data && e.error_data.error_code === 14) {
                        triggerCaptchaUI(true);
                        try {
                            const vkid = await window.vkidCaptcha;
                            if (!vkid || typeof vkid.checkCaptchaError !== 'function') throw new Error("VK Captcha SDK не загрузился");

                            let mockResponseError = {};
                            let currentRemixstlid = null;
                            let sid = e.error_data.captcha_sid || e.error_data.sid;

                            if (e.error_data.redirect_uri) {
                                currentRemixstlid = e.error_data.remixstlid;
                                mockResponseError = { error_code: 14, redirect_uri: e.error_data.redirect_uri };
                            } else {
                                mockResponseError = { error_code: 14, captcha_sid: sid };
                            }

                            const { captchaType, captchaWidget } = vkid.checkCaptchaError({
                                responseHeaders: new Headers(), 
                                url: "https://api.vk.com/method/" + method,
                                responseError: mockResponseError,
                                withWidget: true
                            });

                            if (captchaType) {
                                const overlay = document.getElementById('vk-captcha-overlay');
                                const mountPoint = document.getElementById('vk-captcha-mount');
                                mountPoint.innerHTML = ''; overlay.classList.remove('hidden');

                                // ИСПРАВЛЕНИЕ ЗДЕСЬ: Передаем DOM-элемент mountPoint, а не строку
                                const tokenPromise = captchaWidget.show({ container: mountPoint, view: 'block' });
                                
                                const cancelPromise = new Promise((_, reject) => {
                                    const onCancel = () => {
                                        overlay.removeEventListener('cancelCaptcha', onCancel);
                                        reject(new Error('Отмена капчи пользователем'));
                                    };
                                    overlay.addEventListener('cancelCaptcha', onCancel);
                                });

                                const successToken = await Promise.race([tokenPromise, cancelPromise]);

                                overlay.classList.add('hidden'); mountPoint.innerHTML = '';
                                triggerCaptchaUI(false);

                                attemptParams.captcha_sid = sid;
                                attemptParams.captcha_key = successToken;
                                attemptParams.success_token = successToken;
                                if (currentRemixstlid) attemptParams.remixstlid = currentRemixstlid;
                                
                                continue;
                            } else {
                                throw new Error("Неизвестный тип капчи");
                            }
                        } catch (captchaErr) {
                            const overlay = document.getElementById('vk-captcha-overlay');
                            if (overlay) { overlay.classList.add('hidden'); document.getElementById('vk-captcha-mount').innerHTML = ''; }
                            triggerCaptchaUI(false);
                            if (String(captchaErr).includes('close') || String(captchaErr).includes('Отмена')) throw new Error('Загрузка отменена');
                            throw captchaErr;
                        }
                    } else {
                        throw e;
                    }
                }
            }
        }

        async function apiFetch(endpoint, method = 'GET', body = null) {
            let captchaData = {}; 

            while (true) {
                const urlObj = new URL(`${API_URL}${endpoint}${VK_PARAMS}`);
                
                if (captchaData.success_token && method === 'GET') {
                    urlObj.searchParams.append('success_token', captchaData.success_token);
                    if (captchaData.remixstlid) {
                        urlObj.searchParams.append('remixstlid', captchaData.remixstlid);
                    }
                    if (captchaData.captcha_sid) {
                        urlObj.searchParams.append('captcha_sid', captchaData.captcha_sid);
                        urlObj.searchParams.append('captcha_key', captchaData.success_token);
                    }
                }

                let options = { method, headers: {} };

                if (method === 'POST') {
                    if (body instanceof FormData) {
                        if (captchaData.success_token) {
                            body.delete('success_token'); body.delete('remixstlid');
                            body.delete('captcha_sid'); body.delete('captcha_key');
                            body.append('success_token', captchaData.success_token);
                            if (captchaData.remixstlid) body.append('remixstlid', captchaData.remixstlid);
                            if (captchaData.captcha_sid) {
                                body.append('captcha_sid', captchaData.captcha_sid);
                                body.append('captcha_key', captchaData.success_token);
                            }
                        }
                        options.body = body;
                    } else {
                        options.headers['Content-Type'] = 'application/json';
                        let payload = body ? { ...body } : {};
                        if (captchaData.success_token) {
                            payload.success_token = captchaData.success_token;
                            if (captchaData.remixstlid) payload.remixstlid = captchaData.remixstlid;
                            if (captchaData.captcha_sid) {
                                payload.captcha_sid = captchaData.captcha_sid;
                                payload.captcha_key = captchaData.success_token;
                            }
                        }
                        options.body = JSON.stringify(payload);
                    }
                }

                const res = await fetch(urlObj.toString(), options);

                if (res.ok) return await res.json();

                const contentType = res.headers.get("content-type");
                if (contentType && contentType.includes("application/json")) {
                    const data = await res.json();
                    
                    let isCaptcha = false;
                    let mockResponseError = {};
                    let currentRemixstlid = null;
                    let sid = null;

                    let errObj = data.error || data;

                    if (errObj.redirect_uri) {
                        isCaptcha = true;
                        currentRemixstlid = errObj.remixstlid;
                        mockResponseError = { error_code: 14, redirect_uri: errObj.redirect_uri };
                    } 
                    else if (errObj.error_code === 14 || errObj.type === "captcha") {
                        isCaptcha = true;
                        sid = errObj.sid || errObj.captcha_sid;
                        mockResponseError = { error_code: 14, captcha_sid: sid };
                    }

                    if (isCaptcha) {
                        triggerCaptchaUI(true);

                        try {
                            const vkid = await window.vkidCaptcha;
                            if (!vkid || typeof vkid.checkCaptchaError !== 'function') throw new Error("VK Captcha SDK не загрузился");

                            const { captchaType, captchaWidget } = vkid.checkCaptchaError({
                                responseHeaders: res.headers,
                                url: res.url,
                                responseError: mockResponseError,
                                withWidget: true
                            });

                            if (captchaType) {
                                const overlay = document.getElementById('vk-captcha-overlay');
                                const mountPoint = document.getElementById('vk-captcha-mount');
                                
                                mountPoint.innerHTML = ''; overlay.classList.remove('hidden');

                                // ИСПРАВЛЕНИЕ ЗДЕСЬ: Передаем DOM-элемент mountPoint, а не строку
                                const tokenPromise = captchaWidget.show({ container: mountPoint, view: 'block' });

                                const cancelPromise = new Promise((_, reject) => {
                                    const onCancel = () => {
                                        overlay.removeEventListener('cancelCaptcha', onCancel);
                                        reject(new Error('Отмена капчи пользователем'));
                                    };
                                    overlay.addEventListener('cancelCaptcha', onCancel);
                                });

                                const successToken = await Promise.race([tokenPromise, cancelPromise]);

                                overlay.classList.add('hidden'); mountPoint.innerHTML = '';
                                
                                captchaData = { success_token: successToken, remixstlid: currentRemixstlid, captcha_sid: mockResponseError.captcha_sid };
                                triggerCaptchaUI(false);
                                continue;
                            } else {
                                throw new Error("Неизвестный тип капчи");
                            }
                        } catch (e) {
                            const overlay = document.getElementById('vk-captcha-overlay');
                            if (overlay) { overlay.classList.add('hidden'); document.getElementById('vk-captcha-mount').innerHTML = ''; }
                            triggerCaptchaUI(false);
                            if (String(e).includes('close') || String(e).includes('Отмена')) throw new Error('Загрузка отменена');
                            throw e;
                        }
                    } else {
                        throw new Error(`API Error: ${res.status} - ${errObj.error_msg || JSON.stringify(errObj)}`);
                    }
                }

                throw new Error(`API Error: ${res.status} ${res.statusText}`);
            }
        }

        async function checkGroupAccess() {
            document.getElementById('accessLoading').classList.remove('hidden'); document.getElementById('accessDenied').classList.add('hidden');
            try {
                const appId = Number(new URLSearchParams(VK_PARAMS).get('vk_app_id'));
                if (!appId) throw new Error("No App ID found");
                const authData = await vkBridge.send("VKWebAppGetAuthToken", { "app_id": appId, "scope": "" });
                const memberCheck = await vkBridge.send("VKWebAppCallAPIMethod", { "method": "groups.isMember", "request_id": "gatekeeper", "params": { "group_id": TARGET_GROUP_ID, "v": "5.131", "access_token": authData.access_token } });

                if (memberCheck.response === 1) {
                    const gate = document.getElementById('accessGate');
                    gate.classList.add('opacity-0', 'pointer-events-none');
                    setTimeout(() => gate.classList.add('hidden'), 300);
                    fetchFiles(); 
                } else {
                    document.getElementById('accessLoading').classList.add('hidden'); document.getElementById('accessDenied').classList.remove('hidden'); lucide.createIcons();
                }
            } catch (err) {
                document.getElementById('accessLoading').classList.add('hidden'); document.getElementById('accessDenied').classList.remove('hidden'); lucide.createIcons();
            }
        }

        function isItemInTrash(item) { if (!item.tags) return false; return item.tags.some(t => t.toLowerCase().trim() === '.trash' || t.toLowerCase().trim().startsWith('.trash/')); }

        function toggleSelectionMode() { selectionMode = !selectionMode; selectedIds.clear(); document.getElementById('multiSelectBtn').classList.toggle('text-blue-500', selectionMode); applyFilters(); }

            isActionActive = true; let list = []; newName = newName.trim().replace(/,/g, ' '); 
            if (type === 'file') { const f = allItems.find(i => i.id === item.id) || item; let tags = getItemPath(f); const linkTag = extractHiddenLink(f); if (linkTag) tags = tags ? tags + ',' + LINK_PREFIX + linkTag : LINK_PREFIX + linkTag; list.push({id: f.id, new_title: newName, tags: tags}); } else { const oldP = currentPath.length ? currentPath.join('/')+'/'+item : item; const newP = currentPath.length ? currentPath.join('/')+'/'+newName : newName; allItems.filter(i => { const p = getItemPath(i); return p === oldP || p.startsWith(oldP+'/'); }).forEach(i => { let tags = newP + getItemPath(i).substring(oldP.length); const linkTag = extractHiddenLink(i); if (linkTag) tags = tags ? tags + ',' + LINK_PREFIX + linkTag : LINK_PREFIX + linkTag; list.push({id: i.id, new_title: i.title, tags: tags}); }); }
            showActionLoader(true, `СИНХРОНИЗАЦИЯ (0/${list.length})...`);
            for (let i = 0; i < list.length; i++) { showActionLoader(true, `СИНХРОНИЗАЦИЯ (${i+1}/${list.length})...`); await apiFetch('/move', 'POST', { items: [list[i]] }); await new Promise(r => setTimeout(r, 350)); }
            showActionLoader(false); isActionActive = false; fetchFiles();
        }

        async function bulkMoveToTrash() {
            let list = [];
            for (const idKey of selectedIds) {
                const [type, id] = idKey.split(':');
                if(type === 'file') { const f = allItems.find(i => i.id == id); if(f) { let tags = ".trash,original_path:" + getItemPath(f).replace(/,/g, ' '); const linkTag = extractHiddenLink(f); if (linkTag) tags += ',' + LINK_PREFIX + linkTag; list.push({id: f.id, new_title: f.title.replace(/,/g, ' '), tags: tags}); } } else { const pref = currentPath.length ? currentPath.join('/')+'/'+id : id; allItems.filter(i => { const p = getItemPath(i); return !isItemInTrash(i) && (p === pref || p.startsWith(pref+'/')); }).forEach(i => { let tags = ".trash,original_path:" + getItemPath(i).replace(/,/g, ' '); const linkTag = extractHiddenLink(i); if (linkTag) tags += ',' + LINK_PREFIX + linkTag; list.push({id: i.id, new_title: i.title.replace(/,/g, ' '), tags: tags}); }); }
            }
            isActionActive = true; showActionLoader(true, `УДАЛЕНИЕ (0/${list.length})...`);
            for (let i = 0; i < list.length; i++) { showActionLoader(true, `УДАЛЕНИЕ (${i+1}/${list.length})...`); await apiFetch('/move', 'POST', { items: [list[i]] }); await new Promise(r => setTimeout(r, 350)); }
            toggleSelectionMode(); showActionLoader(false); isActionActive = false; fetchFiles();
        }

        async function bulkRestore() {
            let list = [];
            for (const idKey of selectedIds) { const [type, id] = idKey.split(':'); if(type === 'file') { const f = allItems.find(i => i.id == id); if(f) { let tags = getItemPath(f); const linkTag = extractHiddenLink(f); if (linkTag) tags = tags ? tags + ',' + LINK_PREFIX + linkTag : LINK_PREFIX + linkTag; list.push({id: f.id, new_title: f.title, tags: tags}); } } }
            isActionActive = true; showActionLoader(true, `ВОССТАНОВЛЕНИЕ (0/${list.length})...`);
            for (let i = 0; i < list.length; i++) { showActionLoader(true, `ВОССТАНОВЛЕНИЕ (${i+1}/${list.length})...`); await apiFetch('/move', 'POST', { items: [list[i]] }); await new Promise(r => setTimeout(r, 350)); }
            toggleSelectionMode(); showActionLoader(false); isActionActive = false; fetchFiles();
        }

        async function bulkDeletePermanently() {
            let list = []; for (const idKey of selectedIds) { const [type, id] = idKey.split(':'); if(type === 'file') { const f = allItems.find(i => i.id == id); if(f) list.push(f); } }
            isActionActive = true; showActionLoader(true, `СТИРАЮ (0/${list.length})...`);
            for (let i = 0; i < list.length; i++) { showActionLoader(true, `СТИРАЮ (${i+1}/${list.length})...`); await apiFetch('/delete', 'POST', { doc_id: list[i].id }); await new Promise(r => setTimeout(r, 350)); }
            toggleSelectionMode(); showActionLoader(false); isActionActive = false; fetchFiles();
        }

        async function emptyTrash() {
            const list = allItems.filter(i => isItemInTrash(i)); isActionActive = true; showActionLoader(true, `ОЧИСТКА (0/${list.length})...`);
            for (let i = 0; i < list.length; i++) { showActionLoader(true, `ОЧИСТКА (${i+1}/${list.length})...`); await apiFetch('/delete', 'POST', {doc_id: list[i].id}); await new Promise(r => setTimeout(r, 350)); }
            showActionLoader(false); isActionActive = false; fetchFiles();
        }

        function downloadFile(u, t) { const link = document.createElement('a'); link.href = `${API_URL}/download-proxy?url=${encodeURIComponent(u)}&title=${encodeURIComponent(t)}${VK_PARAMS.replace('?', '&')}`; link.target = '_blank'; document.body.appendChild(link); link.click(); document.body.removeChild(link); }

        function createFolder(n) { 
            const clean = n.trim().replace(/,/g, ' '); 
            const isUrl = /^(https?:\/\/[^\s]+)$/i.test(clean) || /^([a-zA-Z0-9а-яА-ЯёЁ-]+\.)+[a-zA-Zа-яА-ЯёЁ]{2,}(\/[^\s]*)?$/i.test(clean); 
            
            if (isUrl && !clean.includes(' ')) { 
                let urlToSave = clean; if (!/^https?:\/\//i.test(urlToSave)) urlToSave = 'https://' + urlToSave; 
                let domain = "Ссылка"; try { domain = new URL(urlToSave).hostname.replace(/^www\./i, ''); } catch(e){} 
                const file = new File([new Blob(["link"], { type: 'text/plain' })], `${domain}.weblink`, { type: 'text/plain' }); 
                
                if (queue.length === 0) uploadBatchTotal = 0;
                uploadBatchTotal += 1;
                queue.push({ file: file, status: "Ожидание", targetPath: currentPath.join('/'), linkUrl: urlToSave, batchIndex: uploadBatchTotal }); 
                
                document.getElementById('progressContainer').classList.remove('hidden'); 
                processQueue(); 
            } else { 
                if(clean) { currentPath.push(clean); applyFilters(); }
            } 
        }

        function handleFiles(files) { 
            const targetPath = currentPath.join('/'); 
            if (queue.length === 0) uploadBatchTotal = 0;
            
            const startIndex = uploadBatchTotal;
            uploadBatchTotal += files.length;
            
            for (let i = 0; i < files.length; i++) {
                queue.push({ 
                    file: files[i], 
                    status: "Ожидание", 
                    targetPath: targetPath,
                    batchIndex: startIndex + i + 1 
                }); 
            }
            
            document.getElementById('progressContainer').classList.remove('hidden'); 
            processQueue(); 
        }

        async function processQueue() { 
            if (isProcessing) return; 
            isProcessing = true; 
            
            while (queue.some(i => i.status === "Ожидание")) { 
                let item = queue.find(i => i.status === "Ожидание");
                await uploadItem(item); 
                await new Promise(r => setTimeout(r, 1000)); 
            } 
            
            isProcessing = false; 
            queue = [];
            uploadBatchTotal = 0;
            document.getElementById('progressContainer').classList.add('hidden'); 
            fetchFiles(); 
        }

        function uploadItem(item) {
            return new Promise(async (resolve) => {
                item.status = "Загрузка"; 
                
                const p = Math.round((item.batchIndex/uploadBatchTotal)*100); 
                document.getElementById('progressBar').style.width = p+'%'; 
                document.getElementById('progressPercent').innerText = p+'%'; 
                
                const cleanName = item.file.name.replace(/,/g, ' ');
                document.getElementById('progressText').innerText = `${item.batchIndex} из ${uploadBatchTotal} • ${cleanName}`; 
                
                let finalPath = item.targetPath || ""; 
                if (item.linkUrl) finalPath = finalPath ? finalPath + "," + LINK_PREFIX + item.linkUrl : LINK_PREFIX + item.linkUrl; 

                try {
                    const appId = Number(new URLSearchParams(VK_PARAMS).get('vk_app_id'));
                    const userId = new URLSearchParams(VK_PARAMS).get('vk_user_id');
                    const authData = await vkBridge.send("VKWebAppGetAuthToken", { "app_id": appId, "scope": "docs" });
                    const userToken = authData.access_token;

                    const uploadServerReq = await safeVKApiCall("docs.getUploadServer", {
                        "group_id": TARGET_GROUP_ID,
                        "v": "5.131",
                        "access_token": userToken
                    });
                    const uploadUrl = uploadServerReq.upload_url;

                    const fd = new FormData(); 
                    fd.append("file", item.file); 
                    fd.append("upload_url", uploadUrl); 

                    const proxyRes = await fetch(`${API_URL}/upload${VK_PARAMS}`, { method: 'POST', body: fd });
                    const vkUploadData = await proxyRes.json();
                    
                    if (!proxyRes.ok || !vkUploadData.file) {
                        throw new Error(vkUploadData.error || "Ошибка загрузки через сервер");
                    }

                    const uploaderTag = `uploader_${userId}`;
                    let userTags = finalPath ? `${finalPath},${uploaderTag}` : uploaderTag;

                    await safeVKApiCall("docs.save", {
                        "file": vkUploadData.file,
                        "title": cleanName,
                        "tags": userTags,
                        "v": "5.131",
                        "access_token": userToken
                    });

                    item.status = "Готово";
                } catch(e) {
                    item.status = "Ошибка";
                    console.error(`🚨 Ошибка загрузки файла ${cleanName}:`, e);
                    uiAlert('Сбой загрузки', `Файл: ${cleanName}\nПричина: ${e.error_data ? e.error_data.error_msg : e.message || JSON.stringify(e)}`);
                }
                resolve();
            });
        }

        async function handleWeblinkAction(fileUrl, title, action) {
            showActionLoader(true, "ЧТЕНИЕ...");
            try {
                const proxyUrl = `${API_URL}/download-proxy?url=${encodeURIComponent(fileUrl)}&title=link${VK_PARAMS.replace('?', '&')}`;
                let actualLink = await (await fetch(proxyUrl)).text();
                actualLink = actualLink.trim().replace(/^['"]|['"]$/g, ''); 
                showActionLoader(false);
                
                if (!actualLink || !actualLink.startsWith('http')) return uiAlert('Ошибка чтения', 'Не удалось прочитать ссылку.');
                if (action === 'open') window.open(actualLink, '_blank'); else if (action === 'share') uiCopyLink(actualLink);
            } catch (e) { showActionLoader(false); uiAlert('Ошибка', 'Не удалось прочитать ссылку через сервер.'); }
        }

        function handlePreview(url, ext, title, ownerId, docId) {
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
            const isAndroid = /Android/i.test(navigator.userAgent);
            const isPC = !isIOS && !isAndroid;

            const isOffice = ['doc', 'docx', 'xls', 'xlsx', 'ppt', 'pptx'].includes(ext);
            const isArchive = ['zip', 'rar', '7z', 'tar', 'gz'].includes(ext);
            const isText = ['txt', 'csv', 'json', 'md'].includes(ext);
            const isPdf = ext === 'pdf';
            const isVideo = ['mp4', 'mov', 'webm', 'avi', 'mkv'].includes(ext);

            if (isPC && (isOffice || isArchive || isPdf) && ownerId && docId && ownerId !== 'undefined') { window.open(`https://vk.com/doc${ownerId}_${docId}`, '_blank'); return; }

            let targetUrl = url; let type = 'doc';
            if (isOffice) { type = 'office'; targetUrl = isIOS ? `https://view.officeapps.live.com/op/embed.aspx?src=${encodeURIComponent(url)}&wdMobile=1` : `https://view.officeapps.live.com/op/view.aspx?src=${encodeURIComponent(url)}`; } 
            else if (isText || isPdf) { type = 'google'; targetUrl = `https://docs.google.com/viewer?url=${encodeURIComponent(url)}&embedded=true`; } 
            else if (isVideo) { type = 'video'; targetUrl = url; }

            if (isIOS) {
                document.getElementById('docTitle').innerText = title || 'Просмотр';
                const iframe = document.getElementById('docIframe'); const video = document.getElementById('docVideo'); const extLink = document.getElementById('docExternalLink');
                
                if (type === 'video') { iframe.classList.add('hidden'); video.classList.remove('hidden'); video.src = targetUrl; } 
                else { video.classList.add('hidden'); video.pause(); iframe.classList.remove('hidden'); iframe.className = "w-full h-full border-none bg-white"; if (type === 'office') iframe.classList.add('office-zoom-hack'); else iframe.classList.remove('office-zoom-hack'); iframe.src = targetUrl; }
                
                if (extLink) { extLink.href = targetUrl; extLink.classList.remove('hidden'); }
                document.getElementById('docModal').classList.remove('hidden');
            } else { window.open(targetUrl, '_blank'); }
        }

        function closeDocModal() { document.getElementById('docModal').classList.add('hidden'); const iframe = document.getElementById('docIframe'); iframe.src = ''; iframe.className = "w-full h-full border-none"; const video = document.getElementById('docVideo'); video.pause(); video.src = ''; }
        function previewImage(url) { vkBridge.send("VKWebAppShowImages", { images: [url] }).catch(() => { window.open(url, '_blank'); }); }
    </script>
