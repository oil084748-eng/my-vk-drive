<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, user-scalable=no, viewport-fit=cover">
    <title>Мой Диск PRO (Pastel)</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    <style>
        :root {
            --bg-main: #f1f4f8;
            --text-main: #1e252c;
            --blue-main: #3d7eb3;
            --blue-soft: #d4e6f3;
            --green-main: #3e9b7f;
            --green-soft: #d4ede4;
            --red-main: #b96a6a;
            --red-soft: #f0dede;
            --gray-soft: #e8ecf2;
            --gray-mid: #5f6e7a;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            -webkit-tap-highlight-color: transparent;
        }

        .bg-blue-600 { background-color: var(--blue-main) !important; }
        .bg-blue-50  { background-color: var(--blue-soft) !important; }
        .text-blue-600, .text-blue-500 { color: var(--blue-main) !important; }

        .bg-green-600 { background-color: var(--green-main) !important; }
        .bg-green-50  { background-color: var(--green-soft) !important; }
        .text-green-600 { color: var(--green-main) !important; }

        .bg-red-500 { background-color: var(--red-main) !important; }
        .bg-red-50  { background-color: var(--red-soft) !important; }
        .text-red-500 { color: var(--red-main) !important; }

        .bg-gray-50  { background-color: var(--gray-soft) !important; }
        .bg-gray-100 { background-color: #e0e6ed !important; }
        .text-gray-400 { color: var(--gray-mid) !important; }
        .text-gray-800 { color: var(--text-main) !important; }

        .text-gray-500 { color: #26334a !important; }
        .text-gray-600 { color: #1f2a3c !important; }

        .btn-light {
            background-color: var(--gray-soft) !important;
            color: #26334a !important;
            font-weight: 600;
        }

        .border-gray-100 { border-color: #dfe4eb !important; }
        .border-blue-100 { border-color: #c5dfeb !important; }
        .border-green-100 { border-color: #c8e4d7 !important; }
        .border-red-100 { border-color: #e6cfcf !important; }

        .file-card.selected {
            border-color: var(--blue-main);
            background-color: var(--blue-soft);
            box-shadow: 0 0 0 3px rgba(61, 126, 179, 0.15);
        }

        button, .touch-target {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 600;
        }
        button:active, .touch-target:active {
            transform: scale(0.95);
            opacity: 0.85;
        }

        .breadcrumb-item:not(:last-child)::after { content: '›'; margin: 0 8px; color: var(--gray-mid); font-size: 18px; }
        .touch-target { min-height: 44px; min-width: 44px; display: flex; align-items: center; justify-content: center; }
        .sticky-top-block { position: sticky; top: 0; z-index: 100; background-color: white; }
        .animate-slide-down { animation: slideDown 0.2s ease-out; }
        .animate-slide-bottom { animation: slideUp 0.3s ease-out; }
        @keyframes slideDown { from { transform: translateY(-100%); } to { transform: translateY(0); } }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .file-card { will-change: transform, opacity; transition: all 0.2s; }
        
        .bg-captcha-alert { background-color: var(--red-soft) !important; color: var(--red-main) !important; }
        #captchaModal .modal-content { border-bottom: 8px solid var(--red-soft); }
    </style>
</head>
<body class="antialiased">

    <div id="captchaModal" class="hidden fixed inset-0 flex items-center justify-center p-6 z-[4000] backdrop-blur-sm bg-black/40">
        <div class="bg-white rounded-3xl p-7 max-w-sm text-center shadow-2xl modal-content">
            <div class="w-16 h-16 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-4">
                <i data-lucide="shield-alert" class="text-red-500 w-8 h-8"></i>
            </div>
            <h3 class="text-xl font-bold mb-3 text-gray-800">Нужна проверка</h3>
            <div class="bg-red-50 p-4 rounded-2xl mb-6">
                <p class="text-xs text-red-500 leading-relaxed font-medium">ВКонтакте ограничил автоматическую загрузку. Зайдите в группу и загрузите любой файл вручную.</p>
            </div>
            <button onclick="closeCaptcha()" class="bg-blue-600 text-white px-6 py-4 rounded-2xl font-bold w-full uppercase text-[10px] tracking-widest shadow-lg shadow-blue-200">Проверка пройдена</button>
        </div>
    </div>

    <div id="customAlert" class="hidden fixed inset-0 flex items-center justify-center p-6 z-[3000] backdrop-blur-sm bg-black/40">
        <div class="bg-white rounded-[2rem] p-6 w-full max-w-sm shadow-2xl text-center">
            <h3 id="alertTitle" class="text-lg font-bold mb-4 text-gray-800">Информация</h3>
            <div class="max-h-60 overflow-y-auto mb-6 bg-gray-50 p-4 rounded-2xl border border-gray-100">
                <p id="alertDesc" class="text-sm text-gray-600 text-left break-all select-text font-medium"></p>
            </div>
            <button onclick="document.getElementById('customAlert').classList.add('hidden')" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold uppercase text-xs tracking-widest">Закрыть</button>
        </div>
    </div>

    <div id="customPrompt" class="hidden fixed inset-0 flex items-center justify-center p-6 z-[3000] backdrop-blur-sm bg-black/40">
        <div class="bg-white rounded-[2rem] p-6 w-full max-w-sm shadow-2xl">
            <h3 id="promptTitle" class="text-lg font-bold mb-4 text-center text-gray-800">Название</h3>
            <input type="text" id="promptInput" class="w-full p-4 bg-gray-50 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 mb-6 font-medium text-center border-none text-gray-800">
            <div class="flex gap-3">
                <button onclick="closePrompt()" class="flex-1 py-3 font-bold btn-light rounded-xl">Отмена</button>
                <button id="promptConfirmBtn" class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold">ОК</button>
            </div>
        </div>
    </div>

    <div id="customConfirm" class="hidden fixed inset-0 flex items-center justify-center p-6 z-[3000] backdrop-blur-sm bg-black/40">
        <div class="bg-white rounded-[2rem] p-6 w-full max-w-sm shadow-2xl text-center">
            <h3 id="confirmTitle" class="text-lg font-bold mb-2 text-gray-800">Действие</h3>
            <p id="confirmDesc" class="text-sm text-gray-500 text-center mb-6 px-2"></p>
            <div class="flex gap-3">
                <button onclick="closeConfirm()" class="flex-1 py-3 font-bold btn-light rounded-xl">Отмена</button>
                <button id="confirmActionBtn" class="flex-1 bg-red-500 text-white py-3 rounded-xl font-bold uppercase text-xs tracking-widest">Подтвердить</button>
            </div>
        </div>
    </div>

    <div class="sticky-top-block shadow-md">
        <div id="actionLoader" class="hidden bg-blue-600 text-white px-5 py-2.5 flex items-center justify-center animate-slide-down">
            <div id="actionSpinner" class="animate-spin w-3 h-3 border-2 border-white border-t-transparent rounded-full mr-3"></div>
            <span id="actionLoaderText" class="text-[10px] font-black uppercase tracking-widest">Синхронизация...</span>
        </div>
        <nav class="px-4 py-2 flex items-center justify-between gap-2">
            <div class="flex flex-col items-center cursor-pointer min-w-max" onclick="safeNavigate(() => goToRoot())">
                <div class="text-blue-500 mb-0.5"><i data-lucide="cloud" class="w-6 h-6"></i></div>
                <span class="text-[8px] font-black uppercase tracking-tighter text-gray-400 leading-none">Мой Диск</span>
            </div>
            <div class="flex items-center gap-0.5">
                <button onclick="safeNavigate(() => goToTrash())" class="touch-target text-gray-300 hover:text-red-400"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                <button id="multiSelectBtn" onclick="toggleSelectionMode()" class="touch-target text-gray-400"><i data-lucide="more-vertical" class="w-5 h-5"></i></button>
                <button onclick="safeNavigate(() => fetchFiles(this))" class="touch-target text-gray-400"><i data-lucide="rotate-cw" class="w-5 h-5"></i></button>
                <button onclick="uiPrompt('Новая папка', '', (n) => createFolder(n))" class="touch-target text-gray-400"><i data-lucide="folder-plus" class="w-6 h-6"></i></button>
                <button onclick="document.getElementById('fileInput').click()" class="bg-blue-600 text-white px-3 py-2 rounded-xl font-bold text-xs shadow-md active:scale-95 transition-transform ml-1">Загрузить</button>
                <input type="file" id="fileInput" class="hidden" multiple onchange="handleFiles(this.files)">
            </div>
        </nav>
        <div id="trashPanel" class="hidden px-5 py-2 bg-red-50 border-y border-red-100">
            <button onclick="uiConfirm('Очистить корзину?', 'Удалить всё навсегда из ВК?', () => emptyTrash())" class="w-full bg-red-500 text-white py-2.5 rounded-xl font-bold text-[10px] uppercase tracking-widest shadow-sm active:scale-[0.98]">Очистить корзину</button>
        </div>
        <div class="px-5 py-2 flex items-center justify-between gap-4 bg-white border-b border-gray-50 text-[10px] font-black text-gray-400 uppercase tracking-tighter">
            <div id="breadcrumb" class="flex items-center overflow-x-auto whitespace-nowrap scrollbar-hide"></div>
            <select id="sortSelect" onchange="applyFilters()" class="font-bold bg-gray-50 px-2 py-1 rounded-lg border-none outline-none text-blue-600">
                <option value="date_desc">Новые</option>
                <option value="date_asc">Старые</option>
                <option value="name_asc">Имя</option>
            </select>
        </div>
    </div>

    <div id="bottomBar" class="hidden fixed bottom-0 left-0 right-0 bg-white border-t border-blue-100 pt-3 pb-4 px-5 shadow-[0_-10px_30px_rgba(0,0,0,0.05)] z-[2000] animate-slide-bottom">
        <div class="max-w-4xl mx-auto px-5" id="bottomBarInner"></div>
    </div>

    <div id="progressContainer" class="hidden fixed bottom-24 left-5 right-5 bg-white shadow-2xl rounded-2xl p-5 border border-blue-50 z-[100]">
        <div class="flex justify-between items-center mb-3">
            <span id="progressFileName" class="text-[10px] font-black truncate w-40 text-gray-400 uppercase tracking-widest">Файл...</span>
            <span id="progressPercent" class="text-xs font-black text-blue-600">0%</span>
        </div>
        <div class="w-full bg-gray-100 h-2 rounded-full overflow-hidden">
            <div id="progressBar" class="bg-blue-600 h-full w-0 transition-all duration-300"></div>
        </div>
    </div>

    <main class="p-5 max-w-4xl mx-auto min-h-[60vh] pb-32">
        <div class="px-1 mb-6">
            <div class="relative">
                <i data-lucide="search" class="absolute left-4 top-3 text-gray-400 w-4 h-4"></i>
                <input type="text" id="searchInput" oninput="debounceSearch()" placeholder="Поиск файлов..." class="w-full pl-11 pr-4 py-3 bg-gray-50 rounded-xl outline-none text-sm border-none shadow-inner">
            </div>
        </div>
        <div id="fileContainer" class="space-y-3"></div>
    </main>

    <footer class="p-10 text-center">
        <div class="inline-block bg-blue-50 text-blue-600 px-4 py-2 rounded-full text-[10px] font-bold tracking-widest border border-blue-100 uppercase">ВЕРСИЯ: 1.9.7 (PASTEL)</div>
    </footer>

    <script>
        const API_URL = 'https://my-vk-drive-backend.onrender.com';
        const VK_PARAMS = window.location.search;
        let currentPath = []; let allItems = []; let queue = []; let isProcessing = false; let clipboard = null;
        let searchTimeout = null; let captchaResolve = null;
        let selectionMode = false; let selectedIds = new Set();
        let currentVisibleItems = { folders: [], files: [] };
        let isActionActive = false;

        vkBridge.send("VKWebAppInit");
        fetchFiles();
        window.onload = () => { lucide.createIcons(); };

        // 1. Системное окно при обновлении/закрытии
        window.addEventListener('beforeunload', (e) => {
            if (isActionActive || isProcessing) {
                e.preventDefault();
                e.returnValue = 'Процесс ещё не завершен';
            }
        });

        // 2. Внутреннее окно при навигации
        function safeNavigate(callback) {
            if (isActionActive || isProcessing) {
                uiConfirm(
                    'Прервать процесс?', 
                    'Процесс ещё не завершен', 
                    () => { isActionActive = false; isProcessing = false; callback(); }
                );
            } else {
                callback();
            }
        }

        const observer = new MutationObserver(() => { if (document.querySelector('[class*="vkc__"]')) { triggerCaptchaUI("ВВЕДИТЕ КАПЧУ В ВК!"); showCaptchaModal(); } });
        observer.observe(document.body, { childList: true, subtree: true });

        function triggerCaptchaUI(text) {
            const l = document.getElementById('actionLoader');
            if(l) { 
                document.getElementById('actionLoaderText').innerText = text; 
                l.classList.remove('hidden', 'bg-blue-600', 'text-white'); 
                l.classList.add('bg-captcha-alert'); 
                document.getElementById('actionSpinner').classList.add('hidden'); 
            }
            vkBridge.send("VKWebAppTapticNotificationOccurred", {"type": "error"});
        }
        function resetCaptchaUI() {
            const l = document.getElementById('actionLoader');
            if(l) { 
                l.classList.add('hidden'); 
                l.classList.remove('bg-captcha-alert'); 
                l.classList.add('bg-blue-600', 'text-white'); 
                document.getElementById('actionSpinner').classList.remove('hidden'); 
            }
        }

        async function fetchFiles(btn) {
            showActionLoader(true, "СОЕДИНЕНИЕ...");
            if (btn && btn.classList) btn.classList.add('animate-spin');
            try {
                const res = await fetch(`${API_URL}/files${VK_PARAMS}`);
                allItems = await res.json();
                applyFilters();
            } catch (e) { document.getElementById('fileContainer').innerHTML = '<div class="py-20 text-center text-orange-400 font-bold uppercase text-[10px] italic">Сервер просыпается...</div>'; }
            finally { showActionLoader(false); if (btn && btn.classList) setTimeout(() => btn.classList.remove('animate-spin'), 500); }
        }

        function applyFilters() {
            const query = (document.getElementById('searchInput')?.value || "").toLowerCase();
            const sort = document.getElementById('sortSelect').value;
            const pathStr = currentPath.join('/');
            let folders = new Set(), files = [];
            const isTrashRoot = currentPath.length === 1 && currentPath[0] === '.trash';
            document.getElementById('trashPanel').classList.toggle('hidden', !isTrashRoot);

            allItems.forEach(i => {
                const t = i.title || "";
                if (t.startsWith('.trash/')) { if (isTrashRoot) files.push(i); return; }
                if (query) { if (t.toLowerCase().includes(query)) files.push(i); }
                else {
                    if (pathStr === "" && !t.includes('/')) files.push(i);
                    else if (pathStr === "" && t.includes('/')) folders.add(t.split('/')[0]);
                    else if (t.startsWith(pathStr + "/")) {
                        const rel = t.substring(pathStr.length + 1);
                        if (rel.includes('/')) folders.add(rel.split('/')[0]); else files.push(i);
                    }
                }
            });

            files.sort((a, b) => {
                if (sort === 'date_desc') return (b.date || 0) - (a.date || 0);
                if (sort === 'date_asc') return (a.date || 0) - (b.date || 0);
                return (a.title || "").localeCompare(b.title || "");
            });
            
            currentVisibleItems.folders = Array.from(folders).sort();
            currentVisibleItems.files = files;
            render(currentVisibleItems.folders, currentVisibleItems.files);
        }

        function render(folders, files) {
            const container = document.getElementById('fileContainer'); container.innerHTML = '';
            updateBreadcrumb();
            const inTrash = currentPath[0] === '.trash';

            folders.forEach(f => {
                const div = document.createElement('div');
                const isSelected = selectedIds.has('folder:'+f);
                div.className = `bg-white p-5 rounded-3xl flex flex-col gap-4 shadow-sm border border-gray-100 file-card ${isSelected ? 'selected' : ''}`;
                div.onclick = (e) => { if(selectionMode) { toggleItemSelection('folder:'+f); e.stopPropagation(); } };
                div.innerHTML = `<div class="flex items-center gap-4 cursor-pointer" onclick="if(!selectionMode){currentPath.push('${f}'); applyFilters();}">
                    ${selectionMode ? `<div class="p-1">${isSelected ? '<i data-lucide="check-circle-2" class="text-blue-500 w-6 h-6"></i>' : '<i data-lucide="circle" class="text-gray-300 w-6 h-6"></i>'}</div>` : ''}
                    <div class="bg-blue-50 p-3 rounded-2xl text-blue-500"><i data-lucide="folder" class="w-7 h-7 fill-current"></i></div>
                    <div class="flex-1 min-w-0"><div class="font-bold text-gray-800 text-base truncate">${f}</div><div class="text-[10px] text-gray-400 uppercase font-black tracking-widest">Папка</div></div>
                </div>
                ${!selectionMode ? `<div class="flex w-full gap-2 px-1 uppercase text-[11px] font-black text-center">
                    <button onclick="uiPrompt('Имя папки', '${f}', (n) => renameItem('folder', '${f}', n))" class="flex-1 bg-gray-50 text-gray-500 py-2 rounded-xl active:bg-gray-100 transition-colors">Переименовать</button>
                </div>` : ''}`;
                container.appendChild(div);
            });

            files.forEach(file => {
                const div = document.createElement('div');
                const isSelected = selectedIds.has('file:'+file.id);
                div.className = `bg-white p-5 rounded-3xl flex flex-col gap-4 shadow-sm border border-gray-100 file-card ${isSelected ? 'selected' : ''}`;
                div.onclick = (e) => { if(selectionMode) { toggleItemSelection('file:'+file.id); e.stopPropagation(); } };
                const fName = (file.title || "").split('/').pop().replace(/___/g, ' / ');
                div.innerHTML = `<div class="flex items-center gap-4 cursor-pointer">
                    ${selectionMode ? `<div class="p-1">${isSelected ? '<i data-lucide="check-circle-2" class="text-blue-500 w-6 h-6"></i>' : '<i data-lucide="circle" class="text-gray-300 w-6 h-6"></i>'}</div>` : ''}
                    <div class="bg-gray-50 p-3 rounded-2xl text-gray-400"><i data-lucide="file-text" class="w-7 h-7"></i></div>
                    <div class="flex-1 min-w-0"><div class="font-bold text-gray-800 text-base truncate pr-2">${fName}</div><div class="text-[10px] text-blue-500 font-bold uppercase tracking-widest">${((file.size || 0)/1024/1024).toFixed(2)} МБ • ${formatDate(file.date)}</div></div>
                </div>
                ${!selectionMode ? `<div class="flex w-full gap-2 px-1 uppercase text-[11px] font-black text-center">
                    ${inTrash ? `
                        <button onclick="uiAlert('Полное имя', '${fName.replace(/'/g, "\\'")}')" class="flex-1 bg-gray-50 text-gray-500 py-2.5 rounded-xl active:bg-gray-100 transition-colors">Имя</button>
                        <button onclick="restoreItem(${JSON.stringify(file).replace(/"/g, '&quot;')})" class="flex-1 bg-blue-50 text-blue-600 py-2.5 rounded-xl active:bg-blue-100 transition-colors">Восстановить</button>
                        <button onclick="uiConfirm('Стереть навсегда?', 'Удалить из ВК.', () => deleteFilePermanently(${file.id}))" class="flex-1 bg-red-50 text-red-500 py-2.5 rounded-xl active:bg-red-100 transition-colors">Стереть</button>
                    ` : `
                        <button onclick="uiPrompt('Имя файла', '${fName.replace(/'/g, "\\'")}', (n) => renameItem('file', ${JSON.stringify(file).replace(/"/g, '&quot;')}, n))" class="flex-1 bg-gray-50 text-gray-500 py-2.5 rounded-xl active:bg-gray-100 transition-colors">Имя</button>
                        <button onclick="uiAlert('Ссылка на файл', '${file.url}')" class="flex-1 bg-green-50 text-green-600 py-2.5 rounded-xl active:bg-green-100 transition-colors">Поделиться</button>
                        <button onclick="downloadFile('${file.url}', '${fName.replace(/'/g, "\\'")}')" class="flex-1 bg-blue-50 text-blue-600 py-2.5 rounded-xl active:bg-blue-100 transition-colors">Скачать</button>
                    `}
                </div>` : ''}`;
                container.appendChild(div);
            });
            lucide.createIcons(); 
            updateBottomBar();
        }

        function toggleSelectionMode() { 
            selectionMode = !selectionMode; 
            selectedIds.clear(); 
            document.getElementById('multiSelectBtn').classList.toggle('text-blue-500', selectionMode); 
            applyFilters(); 
        }
        function toggleItemSelection(idKey) { 
            if (selectedIds.has(idKey)) selectedIds.delete(idKey); 
            else selectedIds.add(idKey); 
            vkBridge.send("VKWebAppTapticNotificationOccurred", {"type": "light"}); 
            applyFilters(); 
        }

        function selectAll() {
            let allSelected = true;
            currentVisibleItems.folders.forEach(f => { if (!selectedIds.has('folder:'+f)) allSelected = false; });
            currentVisibleItems.files.forEach(file => { if (!selectedIds.has('file:'+file.id)) allSelected = false; });
            
            if (allSelected && (currentVisibleItems.folders.length > 0 || currentVisibleItems.files.length > 0)) {
                currentVisibleItems.folders.forEach(f => selectedIds.delete('folder:'+f));
                currentVisibleItems.files.forEach(file => selectedIds.delete('file:'+file.id));
            } else {
                currentVisibleItems.folders.forEach(f => selectedIds.add('folder:'+f));
                currentVisibleItems.files.forEach(file => selectedIds.add('file:'+file.id));
            }
            vkBridge.send("VKWebAppTapticNotificationOccurred", {"type": "light"});
            applyFilters();
        }

        function updateBottomBar() {
            const bar = document.getElementById('bottomBar');
            const inner = document.getElementById('bottomBarInner');

            if (clipboard !== null) {
                bar.classList.remove('hidden');
                inner.innerHTML = `
                    <div class="flex items-center justify-between gap-3">
                        <button onclick="pasteItem()" class="flex-1 bg-green-600 text-white py-2.5 rounded-xl font-bold text-xs uppercase tracking-wider shadow-sm active:scale-[0.98]">Вставить сюда</button>
                        <button onclick="cancelMove()" class="touch-target text-green-600 bg-white border border-green-200 rounded-xl px-3"><i data-lucide="x" class="w-5 h-5"></i></button>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            if (selectionMode) {
                bar.classList.remove('hidden');
                const count = selectedIds.size;
                const disabled = count === 0 ? 'opacity-50 pointer-events-none' : '';
                const inTrash = currentPath[0] === '.trash';

                if (inTrash) {
                    inner.innerHTML = `
                        <div class="text-blue-600 font-black text-[10px] uppercase tracking-widest text-center mb-2">Выбрано: <span id="selectedCount">${count}</span></div>
                        <div class="flex gap-2 justify-between">
                            <button onclick="selectAll()" class="bg-gray-100 text-gray-600 py-2.5 rounded-xl font-bold text-[9px] uppercase tracking-widest flex-1 active:scale-95 transition-transform">Все</button>
                            <button onclick="bulkRestore()" class="bg-blue-600 text-white py-2.5 rounded-xl font-bold text-[9px] uppercase tracking-widest flex-1 active:scale-95 transition-transform ${disabled}">Восстан.</button>
                            <button onclick="uiConfirm('Стереть выбранные?', 'Удалить навсегда из ВК?', () => bulkDeletePermanently())" class="bg-red-500 text-white py-2.5 rounded-xl font-bold text-[9px] uppercase tracking-widest flex-1 active:scale-95 transition-transform ${disabled}">Стереть</button>
                            <button onclick="toggleSelectionMode()" class="bg-gray-100 text-gray-400 w-10 py-2.5 rounded-xl flex items-center justify-center flex-none active:scale-95 transition-transform"><i data-lucide="x" class="w-4 h-4"></i></button>
                        </div>
                    `;
                } else {
                    inner.innerHTML = `
                        <div class="text-blue-600 font-black text-[10px] uppercase tracking-widest text-center mb-2">Выбрано: <span id="selectedCount">${count}</span></div>
                        <div class="flex gap-2 justify-between">
                            <button onclick="selectAll()" class="bg-gray-100 text-gray-600 py-2.5 rounded-xl font-bold text-[9px] uppercase tracking-widest flex-1 active:scale-95 transition-transform">Все</button>
                            <button onclick="startBulkMove()" class="bg-blue-600 text-white py-2.5 rounded-xl font-bold text-[9px] uppercase tracking-widest flex-1 active:scale-95 transition-transform ${disabled}">Перенос</button>
                            <button onclick="uiConfirm('В корзину?', 'Удалить выбранные файлы?', () => bulkMoveToTrash())" class="bg-red-500 text-white py-2.5 rounded-xl font-bold text-[9px] uppercase tracking-widest flex-1 active:scale-95 transition-transform ${disabled}">В корзину</button>
                            <button onclick="toggleSelectionMode()" class="bg-gray-100 text-gray-400 w-10 py-2.5 rounded-xl flex items-center justify-center flex-none active:scale-95 transition-transform"><i data-lucide="x" class="w-4 h-4"></i></button>
                        </div>
                    `;
                }
                lucide.createIcons();
            } else {
                bar.classList.add('hidden');
            }
        }

        async function startBulkMove() {
            let itemsToMove = [];
            selectedIds.forEach(idKey => { 
                const [type, id] = idKey.split(':'); 
                if(type === 'file') { 
                    const f = allItems.find(i => i.id == id); 
                    if(f) itemsToMove.push({type: 'file', data: f}); 
                } else { 
                    itemsToMove.push({type: 'folder', data: id}); 
                } 
            });
            clipboard = { type: 'bulk', data: itemsToMove, oldPath: currentPath.join('/') }; 
            toggleSelectionMode(); 
            updateBottomBar();
            vkBridge.send("VKWebAppTapticNotificationOccurred", {"type": "success"});
        }

        function cancelMove() { 
            clipboard = null; 
            updateBottomBar(); 
        }

        async function pasteItem() {
            isActionActive = true;
            let nP = currentPath.join('/'); 
            let toUpdate = [];
            if (clipboard.type === 'bulk') {
                clipboard.data.forEach(item => {
                    if(item.type === 'file') { 
                        toUpdate.push({ id: item.data.id, new_title: nP ? `${nP}/${item.data.title.split('/').pop()}` : item.data.title.split('/').pop() }); 
                    } else { 
                        let oldP = clipboard.oldPath ? clipboard.oldPath+'/'+item.data : item.data; 
                        let newP = nP ? nP+'/'+item.data : item.data; 
                        allItems.filter(i => i.title === oldP || i.title.startsWith(oldP+'/')).forEach(i => { 
                            toUpdate.push({id: i.id, new_title: newP + i.title.substring(oldP.length)}); 
                        }); 
                    }
                });
            } else if (clipboard.type === 'file') { 
                toUpdate.push({ id: clipboard.data.id, new_title: nP ? `${nP}/${clipboard.data.title.split('/').pop()}` : clipboard.data.title.split('/').pop() }); 
            } else { 
                let oldP = clipboard.oldPath ? clipboard.oldPath+'/'+clipboard.data : clipboard.data; 
                let newP = nP ? nP+'/'+clipboard.data : clipboard.data; 
                toUpdate = allItems.filter(i => i.title === oldP || i.title.startsWith(oldP+'/')).map(i => ({id: i.id, new_title: newP + i.title.substring(oldP.length)})); 
            }
            
            showActionLoader(true, `ПЕРЕНОС (0/${toUpdate.length})...`);
            for (let i = 0; i < toUpdate.length; i++) {
                showActionLoader(true, `ПЕРЕНОС (${i+1}/${toUpdate.length})...`);
                await fetch(`${API_URL}/move${VK_PARAMS}`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ items: [toUpdate[i]] }) });
                await new Promise(r => setTimeout(r, 350));
            }
            cancelMove(); 
            showActionLoader(false); 
            isActionActive = false;
            fetchFiles();
        }

        function goToTrash() { currentPath = ['.trash']; applyFilters(); }
        async function restoreItem(file) { showActionLoader(true, "ВОССТАНОВЛЕНИЕ..."); const originalTitle = file.title.replace('.trash/', '').replace(/___/g, '/'); await fetch(`${API_URL}/move${VK_PARAMS}`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ items: [{id: file.id, new_title: originalTitle}] }) }); showActionLoader(false); fetchFiles(); }
        async function deleteFilePermanently(id) { showActionLoader(true, "СТИРАЮ..."); await fetch(`${API_URL}/delete${VK_PARAMS}`, {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({doc_id:id})}); showActionLoader(false); fetchFiles(); }
        async function emptyTrash() {
            const list = allItems.filter(i => i.title.startsWith('.trash/'));
            isActionActive = true;
            showActionLoader(true, `ОЧИСТКА (0/${list.length})...`);
            for (let i = 0; i < list.length; i++) {
                showActionLoader(true, `ОЧИСТКА (${i+1}/${list.length})...`);
                await fetch(`${API_URL}/delete${VK_PARAMS}`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({doc_id: list[i].id}) });
                await new Promise(r => setTimeout(r, 350));
            }
            showActionLoader(false); isActionActive = false; fetchFiles();
        }
        function updateBreadcrumb() { const bc = document.getElementById('breadcrumb'); bc.innerHTML = `<span onclick="safeNavigate(() => goToRoot())" class="breadcrumb-item cursor-pointer">ДИСК</span>`; currentPath.forEach((p, idx) => { const s = document.createElement('span'); s.className = 'breadcrumb-item cursor-pointer'; s.innerText = p === '.trash' ? 'КОРЗИНА' : p.toUpperCase(); s.onclick = () => { currentPath = currentPath.slice(0, idx + 1); applyFilters(); }; bc.appendChild(s); }); }
        function goToRoot() { currentPath = []; selectionMode = false; applyFilters(); }
        function debounceSearch() { clearTimeout(searchTimeout); searchTimeout = setTimeout(applyFilters, 150); }
        function uiPrompt(title, defVal, cb) { document.getElementById('promptTitle').innerText = title; document.getElementById('promptInput').value = defVal; document.getElementById('customPrompt').classList.remove('hidden'); document.getElementById('promptInput').focus(); document.getElementById('promptConfirmBtn').onclick = () => { const val = document.getElementById('promptInput').value; if (val) cb(val); closePrompt(); }; }
        function closePrompt() { document.getElementById('customPrompt').classList.add('hidden'); }
        function uiConfirm(title, desc, onAction) { document.getElementById('confirmTitle').innerText = title; document.getElementById('confirmDesc').innerText = desc; document.getElementById('customConfirm').classList.remove('hidden'); document.getElementById('confirmActionBtn').onclick = () => { onAction(); closeConfirm(); }; }
        function closeConfirm() { document.getElementById('customConfirm').classList.add('hidden'); }
        function uiAlert(title, desc) { document.getElementById('alertTitle').innerText = title; document.getElementById('alertDesc').innerText = desc; document.getElementById('customAlert').classList.remove('hidden'); }
        function showActionLoader(show, text = "Синхронизация...") { const al = document.getElementById('actionLoader'); if (al) { document.getElementById('actionLoaderText').innerText = text; al.classList.toggle('hidden', !show); } }
        function formatDate(ts) { if (!ts) return '...'; let d = new Date(ts < 10000000000 ? ts * 1000 : ts); return d.toLocaleString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' }); }

        async function renameItem(type, item, newName) {
            let oldF = type === 'file' ? item.title : (currentPath.length ? currentPath.join('/')+'/'+item : item);
            let newF = oldF.split('/').slice(0,-1).concat(newName).join('/');
            const list = allItems.filter(i => i.title === oldF || (type === 'folder' && i.title.startsWith(oldF+'/'))).map(i => ({id: i.id, new_title: type === 'file' ? newF : newF + i.title.substring(oldF.length)}));
            isActionActive = true;
            showActionLoader(true, `СИНХРОНИЗАЦИЯ (0/${list.length})...`);
            for (let i = 0; i < list.length; i++) {
                showActionLoader(true, `СИНХРОНИЗАЦИЯ (${i+1}/${list.length})...`);
                await fetch(`${API_URL}/move${VK_PARAMS}`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ items: [list[i]] }) });
                await new Promise(r => setTimeout(r, 350));
            }
            showActionLoader(false); isActionActive = false; fetchFiles();
        }
        async function bulkMoveToTrash() {
            let list = [];
            for (const idKey of selectedIds) {
                const [type, id] = idKey.split(':');
                if(type === 'file') { const f = allItems.find(i => i.id == id); if(f) list.push({id: f.id, new_title: '.trash/' + f.title.replace(/\//g, '___')}); }
                else { const pref = currentPath.length ? currentPath.join('/')+'/'+id : id; allItems.filter(i => i.title === pref || i.title.startsWith(pref+'/')).forEach(i => { list.push({id: i.id, new_title: '.trash/' + i.title.replace(/\//g, '___')}); }); }
            }
            isActionActive = true;
            showActionLoader(true, `УДАЛЕНИЕ (0/${list.length})...`);
            for (let i = 0; i < list.length; i++) {
                showActionLoader(true, `УДАЛЕНИЕ (${i+1}/${list.length})...`);
                await fetch(`${API_URL}/move${VK_PARAMS}`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ items: [list[i]] }) });
                await new Promise(r => setTimeout(r, 350));
            }
            toggleSelectionMode(); showActionLoader(false); isActionActive = false; fetchFiles();
        }
        async function bulkRestore() {
            let list = [];
            for (const idKey of selectedIds) {
                const [type, id] = idKey.split(':');
                if(type === 'file') { const f = allItems.find(i => i.id == id); if(f) { const ot = f.title.replace('.trash/', '').replace(/___/g, '/'); list.push({id: f.id, new_title: ot}); } }
            }
            isActionActive = true;
            showActionLoader(true, `ВОССТАНОВЛЕНИЕ (0/${list.length})...`);
            for (let i = 0; i < list.length; i++) {
                showActionLoader(true, `ВОССТАНОВЛЕНИЕ (${i+1}/${list.length})...`);
                await fetch(`${API_URL}/move${VK_PARAMS}`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ items: [list[i]] }) });
                await new Promise(r => setTimeout(r, 350));
            }
            toggleSelectionMode(); showActionLoader(false); isActionActive = false; fetchFiles();
        }
        async function bulkDeletePermanently() {
            let list = [];
            for (const idKey of selectedIds) {
                const [type, id] = idKey.split(':');
                if(type === 'file') { const f = allItems.find(i => i.id == id); if(f) list.push(f); }
            }
            isActionActive = true;
            showActionLoader(true, `СТИРАЮ (0/${list.length})...`);
            for (let i = 0; i < list.length; i++) {
                showActionLoader(true, `СТИРАЮ (${i+1}/${list.length})...`);
                await fetch(`${API_URL}/delete${VK_PARAMS}`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ doc_id: list[i].id }) });
                await new Promise(r => setTimeout(r, 350));
            }
            toggleSelectionMode(); showActionLoader(false); isActionActive = false; fetchFiles();
        }
        function downloadFile(u, t) {
            const downloadUrl = `${API_URL}/download-proxy?url=${encodeURIComponent(u)}&title=${encodeURIComponent(t)}${VK_PARAMS.replace('?', '&')}`;
            const link = document.createElement('a');
            link.href = downloadUrl;
            link.target = '_blank';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
        function createFolder(n) { currentPath.push(n); applyFilters(); }
        
        function handleFiles(files) { const targetPath = currentPath.join('/'); for (const f of files) queue.push({ file: f, status: "Ожидание", targetPath: targetPath }); document.getElementById('progressContainer').classList.remove('hidden'); processQueue(); }
        async function processQueue() { if (isProcessing) return; isProcessing = true; while (queue.some(i => i.status === "Ожидание")) { const item = queue.find(i => i.status === "Ожидание"); await uploadItem(item); await new Promise(r => setTimeout(r, 1200)); } isProcessing = false; document.getElementById('progressContainer').classList.add('hidden'); fetchFiles(); }
        function uploadItem(item) {
            return new Promise(resolve => {
                item.status = "Загрузка"; const fd = new FormData(); fd.append("file", item.file); fd.append("folder_path", item.targetPath); const x = new XMLHttpRequest();
                x.open("POST", `${API_URL}/upload${VK_PARAMS}`);
                x.upload.onprogress = (e) => { const p = Math.round((e.loaded/e.total)*100); document.getElementById('progressBar').style.width = p+'%'; document.getElementById('progressPercent').innerText = p+'%'; document.getElementById('progressFileName').innerText = item.file.name; };
                x.onload = async () => { if (x.status === 200) { item.status = "Готово"; resolve(); } else { item.status = "Ожидание"; triggerCaptchaUI("НУЖНА КАПЧА!"); await showCaptchaModal(); resetCaptchaUI(); resolve(); } };
                x.onerror = () => { item.status = "Ожидание"; triggerCaptchaUI("СБОЙ СЕТИ!"); showCaptchaModal(); resolve(); }; x.send(fd);
            });
        }
        function showCaptchaModal() { return new Promise(r => { document.getElementById('captchaModal').classList.remove('hidden'); captchaResolve = r; }); }
        function closeCaptcha() { document.getElementById('captchaModal').classList.add('hidden'); if(captchaResolve) captchaResolve(); }
    </script>
</body>
