<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, user-scalable=no, viewport-fit=cover">
    
    <!-- Разрешения для работы с твоим сервером -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://unpkg.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: http://localhost:3000; connect-src 'self' http://localhost:3000 https://api.vk.com;">

    <title>VK Drive PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>

    <style>
        body { 
            font-family: 'Roboto', sans-serif; 
            background-color: #f7f9fc; 
            color: #3c4043;
            /* Учет системных рамок телефонов (челок) */
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
        }
        .breadcrumb-item:not(:last-child)::after { content: '›'; margin: 0 8px; color: #5f6368; font-size: 18px; }
        
        /* Чтобы кнопки было легко нажимать пальцем */
        .touch-target { min-height: 44px; min-width: 44px; display: flex; align-items: center; justify-content: center; }
        
        /* Скрытие полосы прокрутки хлебных крошек */
        #breadcrumb::-webkit-scrollbar { display: none; }
        #breadcrumb { -ms-overflow-style: none; scrollbar-width: none; }

        tr:hover .action-btns { opacity: 1; }
        @media (max-width: 640px) {
            .action-btns { opacity: 1 !important; } /* На мобилках всегда видны кнопки */
        }
    </style>
</head>
<body class="antialiased">

    <!-- МОДАЛКА КАПЧИ -->
    <div id="captchaModal" class="hidden fixed inset-0 flex items-center justify-center p-6 z-[1000]">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm"></div>
        <div class="bg-white rounded-[2rem] p-8 w-full max-w-sm shadow-2xl text-center relative z-10">
            <h3 class="text-xl font-bold mb-6">Безопасность</h3>
            <div class="relative mb-6 bg-gray-100 rounded-2xl p-4 min-h-[120px] flex items-center justify-center border border-gray-100">
                <img id="captchaImg" src="" class="rounded-lg">
                <button id="captchaRefresh" class="absolute top-2 right-2 p-2 bg-white rounded-full shadow-md text-blue-600">
                    <i data-lucide="refresh-cw" class="w-5 h-5"></i>
                </button>
            </div>
            <input type="text" id="captchaInput" placeholder="Код" class="w-full p-4 bg-gray-50 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 mb-6 font-bold text-center text-2xl tracking-[0.3em] uppercase">
            <button id="captchaSubmit" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold text-lg active:scale-95 transition">Готово</button>
        </div>
    </div>

    <!-- ВЕРХНЯЯ ПАНЕЛЬ -->
    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50 px-5 py-3 flex flex-col gap-3">
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-2 cursor-pointer" onclick="goToRoot()">
                <div class="text-[#4285F4]"><i data-lucide="play" class="fill-current w-7 h-7 rotate-[-90deg]"></i></div>
                <span class="text-xl text-[#5f6368] font-medium tracking-tight">VK Drive</span>
            </div>
            <div class="flex items-center gap-1">
                <button onclick="createFolder()" class="touch-target hover:bg-gray-100 rounded-full text-[#5f6368]">
                    <i data-lucide="folder-plus" class="w-6 h-6"></i>
                </button>
                <button onclick="document.getElementById('fileInput').click()" class="bg-[#1a73e8] active:bg-[#1765cc] text-white px-5 py-2.5 rounded-xl font-medium text-sm shadow-md transition-all">
                    Загрузить
                </button>
                <input type="file" id="fileInput" class="hidden" multiple onchange="handleFiles(this.files)">
            </div>
        </div>
        
        <!-- ПОИСК -->
        <div class="relative">
            <i data-lucide="search" class="absolute left-4 top-3 text-[#5f6368] w-5 h-5"></i>
            <input type="text" id="searchInput" oninput="applyFilters()" placeholder="Поиск файлов..." class="w-full pl-12 pr-4 py-3 bg-[#f1f3f4] rounded-xl border-none focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none transition-all">
        </div>
    </nav>

    <!-- ТУЛБАР / ХЛЕБНЫЕ КРОШКИ -->
    <div class="bg-white border-b border-gray-200 px-5 py-3 flex items-center justify-between gap-4">
        <div id="breadcrumb" class="flex items-center text-sm font-medium text-[#5f6368] overflow-x-auto whitespace-nowrap scroll-smooth">
            <!-- Крошки вставятся сюда -->
        </div>
        <div class="flex items-center gap-2">
            <div id="moveIndicator" class="hidden flex items-center gap-2 bg-[#fef7e0] border border-[#fce8b2] px-3 py-1.5 rounded-full text-[10px] font-bold text-[#b06000] whitespace-nowrap">
                <span>ПЕРЕНОС</span>
                <button onclick="cancelMove()" class="p-1"><i data-lucide="x" class="w-3 h-3"></i></button>
            </div>
            <button id="pasteBtn" onclick="pasteItem()" class="hidden bg-green-600 text-white px-4 py-2 rounded-lg text-xs font-bold shadow-sm active:scale-95 transition">ВСТАВИТЬ</button>
        </div>
    </div>

    <!-- КАРТОЧКА ЗАГРУЗКИ -->
    <div id="progressContainer" class="hidden fixed bottom-10 left-5 right-5 sm:left-auto sm:right-10 sm:w-80 bg-white shadow-2xl rounded-2xl p-5 border border-gray-200 z-[100]">
        <div class="flex justify-between items-center mb-3">
            <span id="progressFileName" class="text-sm font-medium truncate w-40 text-[#3c4043]">Файл...</span>
            <span id="progressPercent" class="text-sm font-bold text-[#1a73e8]">0%</span>
        </div>
        <div class="w-full bg-gray-200 h-2 rounded-full overflow-hidden">
            <div id="progressBar" class="bg-[#1a73e8] h-full w-0 transition-all duration-300"></div>
        </div>
    </div>

    <!-- ГЛАВНЫЙ СПИСОК -->
    <main class="p-5 max-w-4xl mx-auto">
        <div id="fileContainer" class="space-y-2">
            <!-- Тут будут файлы и папки -->
        </div>
    </main>

    <script>
        // Тот же самый скрипт, но с улучшенной отрисовкой для мобилок
        const API_URL = 'http://localhost:3000';
        let currentPath = []; 
        let allItems = [];
        let clipboard = null;

        vkBridge.send("VKWebAppInit");

        window.onload = () => { fetchFiles(); lucide.createIcons(); };

        async function fetchFiles() {
            try {
                const res = await fetch(`${API_URL}/files`);
                allItems = await res.json();
                applyFilters();
            } catch (e) { console.error(e); }
        }

        async function handleFiles(files) {
            if (!files.length) return;
            document.getElementById('progressContainer').classList.remove('hidden');
            for (const file of files) {
                let captchaData = null, success = false;
                while (!success) {
                    const res = await uploadSingleFile(file, captchaData);
                    if (res.status === 200) success = true;
                    else if (res.status === 403) {
                        captchaData = await showCaptcha(res.data.captcha_img, res.data.captcha_sid);
                        if (captchaData === "refresh") { captchaData = null; continue; }
                    } else { alert("Ошибка загрузки"); break; }
                }
            }
            document.getElementById('progressContainer').classList.add('hidden');
            document.getElementById('fileInput').value = ""; fetchFiles();
        }

        function uploadSingleFile(file, captcha) {
            return new Promise((resolve) => {
                const fd = new FormData();
                fd.append('file', file);
                fd.append('folder_path', currentPath.join('/'));
                if (captcha) { fd.append('captcha_sid', captcha.sid); fd.append('captcha_key', captcha.key); }
                const xhr = new XMLHttpRequest();
                xhr.open('POST', `${API_URL}/upload`, true);
                xhr.upload.onprogress = (e) => {
                    const p = Math.round((e.loaded / e.total) * 100);
                    document.getElementById('progressBar').style.width = p + '%';
                    document.getElementById('progressPercent').innerText = p + '%';
                    document.getElementById('progressFileName').innerText = file.name;
                };
                xhr.onload = () => { let d = {}; try { d = JSON.parse(xhr.responseText); } catch(e) {} resolve({ status: xhr.status, data: d }); };
                xhr.send(fd);
            });
        }

        async function showCaptcha(imgUrl, sid) {
            return new Promise(async (resolve) => {
                const modal = document.getElementById('captchaModal');
                const imgTag = document.getElementById('captchaImg');
                const input = document.getElementById('captchaInput');
                const btn = document.getElementById('captchaSubmit');
                modal.classList.remove('hidden');
                const proxyRes = await fetch(`${API_URL}/captcha-proxy?src=${encodeURIComponent(imgUrl)}`);
                const json = await proxyRes.json();
                imgTag.src = json.data;
                btn.onclick = () => { if (input.value) { modal.classList.add('hidden'); resolve({ sid, key: input.value }); } };
            });
        }

        function applyFilters() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const pathStr = currentPath.join('/');
            let folders = new Set(), files = [];
            allItems.forEach(i => {
                const t = i.title;
                if (query) { if (t.toLowerCase().includes(query)) files.push(i); }
                else {
                    if (pathStr === "" && !t.includes('/')) files.push(i);
                    else if (pathStr === "" && t.includes('/')) folders.add(t.split('/')[0]);
                    else if (t.startsWith(pathStr + "/")) {
                        const rel = t.substring(pathStr.length + 1);
                        if (rel.includes('/')) folders.add(rel.split('/')[0]); else files.push(i);
                    }
                }
            });
            render(Array.from(folders).sort(), files);
        }

        function render(folders, files) {
            const container = document.getElementById('fileContainer');
            container.innerHTML = '';
            updateBreadcrumb();
            
            // ПАПКИ
            folders.forEach(f => {
                const div = document.createElement('div');
                div.className = 'bg-white p-4 rounded-2xl flex items-center justify-between border border-gray-100 shadow-sm active:bg-gray-50';
                div.onclick = (e) => { if (!e.target.closest('button')) { currentPath.push(f); applyFilters(); } };
                div.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="bg-blue-50 p-2 rounded-xl text-blue-600"><i data-lucide="folder" class="w-6 h-6 fill-current"></i></div>
                        <span class="font-medium text-gray-800">${f}</span>
                    </div>
                    <div class="flex gap-1">
                        <button onclick="renameItem('folder', '${f}')" class="touch-target text-gray-400 hover:text-blue-600"><i data-lucide="edit-2" class="w-5 h-5"></i></button>
                        <button onclick="startMove('folder', '${f}')" class="touch-target text-gray-400 hover:text-blue-600"><i data-lucide="scissors" class="w-5 h-5"></i></button>
                    </div>`;
                container.appendChild(div);
            });

            // ФАЙЛЫ
            files.forEach(file => {
                const div = document.createElement('div');
                div.className = 'bg-white p-4 rounded-2xl flex flex-col gap-3 border border-gray-100 shadow-sm';
                const name = file.title.split('/').pop();
                div.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="bg-gray-50 p-2 rounded-xl text-gray-500"><i data-lucide="file-text" class="w-6 h-6"></i></div>
                        <div class="flex flex-col overflow-hidden">
                            <span class="font-medium text-gray-800 truncate">${name}</span>
                            <span class="text-xs text-gray-400">${(file.size/1024/1024).toFixed(2)} МБ</span>
                        </div>
                    </div>
                    <div class="flex justify-around border-t border-gray-50 pt-2">
                        <button onclick="downloadFile('${file.url}', '${file.title}')" class="touch-target text-gray-500"><i data-lucide="download" class="w-5 h-5"></i></button>
                        <button onclick="renameItem('file', ${JSON.stringify(file).replace(/"/g, '&quot;')})" class="touch-target text-gray-500"><i data-lucide="edit-2" class="w-5 h-5"></i></button>
                        <button onclick="startMove('file', ${JSON.stringify(file).replace(/"/g, '&quot;')})" class="touch-target text-gray-500"><i data-lucide="scissors" class="w-5 h-5"></i></button>
                        <button onclick="deleteFile(${file.id})" class="touch-target text-red-400"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                    </div>`;
                container.appendChild(div);
            });

            if(!folders.length && !files.length) {
                container.innerHTML = '<div class="py-20 text-center text-gray-400">Папка пуста</div>';
            }
            lucide.createIcons();
        }

        // --- ЛОГИКА ОСТАЕТСЯ ПРЕЖНЕЙ ---
        async function renameItem(type, item) {
            if (type === 'file') {
                const parts = item.title.split('/');
                const oldName = parts.pop();
                const prefix = parts.join('/');
                const newName = prompt("Новое имя:", oldName);
                if (!newName || newName === oldName) return;
                const newFull = prefix ? `${prefix}/${newName}` : newName;
                await fetch(`${API_URL}/move`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ items: [{id: item.id, new_title: newFull}] }) });
            } else {
                const newFolderName = prompt("Новое имя папки:", item);
                if (!newFolderName || newFolderName === item) return;
                const pathPrefix = currentPath.length > 0 ? `${currentPath.join('/')}/` : "";
                const oldFullPrefix = `${pathPrefix}${item}/`;
                const newFullPrefix = `${pathPrefix}${newFolderName}/`;
                let itemsToMove = [];
                allItems.forEach(i => {
                    if (i.title.startsWith(oldFullPrefix)) itemsToMove.push({ id: i.id, new_title: newFullPrefix + i.title.substring(oldFullPrefix.length) });
                    else if (i.title === oldFullPrefix.slice(0, -1)) itemsToMove.push({ id: i.id, new_title: newFullPrefix.slice(0, -1) });
                });
                await fetch(`${API_URL}/move`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ items: itemsToMove }) });
            }
            fetchFiles();
        }

        function startMove(type, item) { 
            clipboard = { type, data: item, oldPath: currentPath.join('/') }; 
            document.getElementById('moveIndicator').classList.remove('hidden'); 
            document.getElementById('pasteBtn').classList.remove('hidden'); 
        }

        function cancelMove() { clipboard = null; document.getElementById('moveIndicator').classList.add('hidden'); document.getElementById('pasteBtn').classList.add('hidden'); }

        async function pasteItem() {
            if (!clipboard) return;
            const newPath = currentPath.join('/');
            let itemsToMove = [];
            if (clipboard.type === 'file') {
                const name = clipboard.data.title.split('/').pop();
                itemsToMove.push({ id: clipboard.data.id, new_title: newPath ? `${newPath}/${name}` : name });
            } else {
                const fName = clipboard.data;
                const oldPrefix = clipboard.oldPath ? `${clipboard.oldPath}/${fName}/` : `${fName}/`;
                const newPrefix = newPath ? `${newPath}/${fName}/` : `${fName}/`;
                allItems.forEach(i => {
                    if (i.title.startsWith(oldPrefix)) itemsToMove.push({ id: i.id, new_title: newPrefix + i.title.substring(oldPrefix.length) });
                    else if (i.title === oldPrefix.slice(0, -1)) itemsToMove.push({ id: i.id, new_title: newPrefix.slice(0, -1) });
                });
            }
            await fetch(`${API_URL}/move`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ items: itemsToMove }) });
            cancelMove(); fetchFiles();
        }

        function updateBreadcrumb() {
            const bc = document.getElementById('breadcrumb');
            bc.innerHTML = `<span class="breadcrumb-item cursor-pointer" onclick="goToRoot()">Мой диск</span>`;
            let tmp = []; currentPath.forEach(p => { 
                tmp.push(p); 
                const s = document.createElement('span'); 
                s.className = 'breadcrumb-item cursor-pointer'; 
                s.innerText = p; 
                const snap = [...tmp]; 
                s.onclick = () => { currentPath = snap; applyFilters(); }; 
                bc.appendChild(s); 
            });
            bc.scrollLeft = bc.scrollWidth;
        }

        function createFolder() { const n = prompt("Имя папки:"); if (n) { currentPath.push(n); applyFilters(); } }
        function goToRoot() { currentPath = []; applyFilters(); }
        function downloadFile(u, t) { window.open(`${API_URL}/download-proxy?url=${encodeURIComponent(u)}&title=${encodeURIComponent(t)}`); }
        async function deleteFile(id) { if (confirm("Удалить файл?")) { await fetch(`${API_URL}/delete`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({doc_id: id}) }); fetchFiles(); } }
    </script>
</body>
</html>
